<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>DEFCON Meet Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500;600&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; background: #060a10; }
    body {
      min-height: 100%; min-height: 100dvh;
      background: #060a10;
      font-family: 'Syne', sans-serif;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
    }
    #root { height: 100vh; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
    input, button, select { -webkit-appearance: none; appearance: none; font-family: 'Syne', sans-serif; }
    input[type=number]::-webkit-inner-spin-button { opacity: 0.3; }
    input[type="date"]::-webkit-calendar-picker-indicator,
    input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(0.5); }
    ::-webkit-scrollbar { width: 2px; height: 2px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
    * { -webkit-font-smoothing: antialiased; }
    input:focus { outline: none !important; border-color: rgba(201,168,76,0.4) !important; box-shadow: 0 0 0 3px rgba(201,168,76,0.06) !important; }
    button { cursor: pointer; transition: opacity 0.15s, transform 0.1s; }
    button:active { opacity: 0.7 !important; transform: scale(0.97); }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ─── Design tokens ─────────────────────────────────────────────────────────────
const C = {
  bg: "#060a10", bg2: "#0c1220",
  surface: "rgba(255,255,255,0.025)", surface2: "rgba(255,255,255,0.05)",
  border: "rgba(255,255,255,0.07)", border2: "rgba(255,255,255,0.13)",
  gold: "#c9a84c", goldDim: "rgba(201,168,76,0.12)", goldBorder: "rgba(201,168,76,0.28)",
  red: "#e05252", redDim: "rgba(224,82,82,0.1)", redBorder: "rgba(224,82,82,0.28)",
  green: "#4caf83", greenDim: "rgba(76,175,131,0.1)", greenBorder: "rgba(76,175,131,0.28)",
  text: "#d8e0ed", muted: "#52617a", muted2: "#3a4559",
  squat: "#f5a020", squatDim: "rgba(245,160,32,0.12)",
  bench: "#5b8de0", benchDim: "rgba(91,141,224,0.12)",
  deadlift: "#e05252", deadliftDim: "rgba(224,82,82,0.12)",
};

const inp = {
  background: "rgba(255,255,255,0.04)", border: `1px solid ${C.border}`,
  borderRadius: 8, color: C.text, padding: "11px 13px", fontSize: 15,
  fontFamily: "'DM Mono', monospace", outline: "none", width: "100%", display: "block",
};
const btnGold = { background: C.goldDim, border: `1px solid ${C.goldBorder}`, borderRadius: 10, color: C.gold, fontSize: 14, fontWeight: 700, padding: "13px 20px", width: "100%", letterSpacing: "0.04em" };
const btnGhost = { background: "rgba(255,255,255,0.03)", border: `1px dashed ${C.border}`, borderRadius: 10, color: C.muted, fontSize: 13, fontWeight: 600, padding: "11px 16px", width: "100%" };
const btnSm = { background: "rgba(255,255,255,0.04)", border: `1px solid ${C.border}`, borderRadius: 6, color: C.muted, fontSize: 12, fontWeight: 600, padding: "6px 12px" };
const btnDanger = { background: C.redDim, border: `1px solid ${C.redBorder}`, borderRadius: 6, color: C.red, fontSize: 12, fontWeight: 600, padding: "5px 10px" };

// ─── Constants ─────────────────────────────────────────────────────────────────
const MOVEMENTS = [
  { key: "squat",    label: "Squat",    short: "SQ", color: C.squat,    dim: C.squatDim    },
  { key: "bench",    label: "Bench",    short: "BP", color: C.bench,    dim: C.benchDim    },
  { key: "deadlift", label: "Deadlift", short: "DL", color: C.deadlift, dim: C.deadliftDim },
];
const MOV_ORDER = ["squat", "bench", "deadlift"];
const PLANS = [
  { key: "conservative", label: "Conservatif", color: C.green  },
  { key: "classic",      label: "Classique",   color: C.gold   },
  { key: "aggressive",   label: "Agressif",    color: C.red    },
];

// ─── Utils ─────────────────────────────────────────────────────────────────────
function uid() { return Math.random().toString(36).slice(2, 9); }
function timeToMinutes(hhmm) {
  if (!hhmm) return 0;
  const [h, m] = hhmm.split(":").map(Number);
  return h * 60 + (m || 0);
}
function minutesToTime(mins) {
  const v = (((mins % 1440) + 1440) % 1440);
  const totalSec = Math.round(v * 60);
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`;
}
function nowSeconds() {
  const n = new Date();
  return n.getHours() * 3600 + n.getMinutes() * 60 + n.getSeconds();
}
function formatDate(iso) {
  if (!iso) return "";
  return new Date(iso + "T12:00:00").toLocaleDateString("fr-FR", { day:"numeric", month:"long", year:"numeric" });
}
function daysUntil(iso) {
  if (!iso) return null;
  const t = new Date(); t.setHours(0,0,0,0);
  const c = new Date(iso + "T00:00:00"); c.setHours(0,0,0,0);
  return Math.round((c - t) / 86400000);
}

// ─── Audio (calibrated: fires exactly at start time) ───────────────────────────
let _ctx = null;
function getCtx() {
  if (!_ctx) { try { _ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {} }
  if (_ctx?.state === "suspended") _ctx.resume();
  return _ctx;
}
function tone(freq, dur, vol, when) {
  const ctx = getCtx(); if (!ctx) return;
  try {
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = freq; o.type = "sine";
    const t = when ?? ctx.currentTime;
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(vol, t + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.start(t); o.stop(t + dur);
  } catch(e) {}
}
function playAlert() {
  const ctx = getCtx(); if (!ctx) return;
  const t = ctx.currentTime;
  tone(660, 0.18, 0.5, t);
  tone(880, 0.18, 0.6, t + 0.22);
  tone(1100, 0.18, 0.65, t + 0.44);
  tone(1320, 0.55, 0.75, t + 0.66);
}
function playWarn() {
  const ctx = getCtx(); if (!ctx) return;
  const t = ctx.currentTime;
  tone(440, 0.25, 0.3, t);
  tone(550, 0.3,  0.3, t + 0.35);
}
function initAudio() { tone(440, 0.04, 0.03); }

// ─── Firebase REST + SSE ────────────────────────────────────────────────────────
async function fbGet(url, code) {
  try {
    const r = await fetch(`${url}/teams/${encodeURIComponent(code)}.json`, { signal: AbortSignal.timeout(8000) });
    if (!r.ok) return null;
    return await r.json();
  } catch { return null; }
}
async function fbSet(url, code, data) {
  try {
    const r = await fetch(`${url}/teams/${encodeURIComponent(code)}.json`, {
      method:"PUT", headers:{"Content-Type":"application/json"},
      body: JSON.stringify(data), signal: AbortSignal.timeout(8000)
    });
    return r.ok;
  } catch { return false; }
}

// ─── Default data ───────────────────────────────────────────────────────────────
function defaultMovement(startTime = "10:00") {
  return {
    compStartTime: startTime,
    position: 1,
    restBetween: 6,
    setDuration: 1.5,
    bufferBeforeOpener: 8,
    openerWeight: "",
    warmupSets: [
      { id: uid(), weight: 0 },
      { id: uid(), weight: 70 },
      { id: uid(), weight: 120 },
    ],
    gamePlan: {
      attempt2: { conservative:"", classic:"", aggressive:"" },
      attempt3: { conservative:"", classic:"", aggressive:"" },
    },
    doneSets: {},
  };
}
function defaultAthlete(name = "Athlète") {
  return {
    id: uid(), name,
    currentMovement: "squat",
    movements: {
      squat:    defaultMovement("10:00"),
      bench:    defaultMovement("13:00"),
      deadlift: defaultMovement("16:00"),
    },
  };
}
function defaultComp(name = "Nouvelle compétition") {
  return { id: uid(), name, date: "", athletes: [defaultAthlete("Athlète 1")] };
}

// ─── Schedule ──────────────────────────────────────────────────────────────────
function computeSchedule(mov, delay = 0) {
  if (!mov?.warmupSets?.length || !mov.compStartTime) return [];
  const { compStartTime, position, restBetween, setDuration, bufferBeforeOpener, warmupSets } = mov;
  const n = warmupSets.length;
  const liftMin = timeToMinutes(compStartTime) + (position - 1) + delay;
  const lastStart = liftMin - bufferBeforeOpener - setDuration;
  return warmupSets.map((set, i) => {
    const offset = (n - 1 - i) * (restBetween + setDuration);
    const startMin = lastStart - offset;
    return { ...set, index: i, startMin, startTime: minutesToTime(startMin) };
  });
}

// ─── Countdown badge ───────────────────────────────────────────────────────────
function Countdown({ targetMin, sm }) {
  const [secs, setSecs] = useState(null);
  useEffect(() => {
    const upd = () => setSecs(Math.round(targetMin * 60 - nowSeconds()));
    upd(); const iv = setInterval(upd, 500); return () => clearInterval(iv);
  }, [targetMin]);
  if (secs === null) return null;
  const abs = Math.abs(secs), m = Math.floor(abs/60), s = abs%60;
  const txt = `${secs<0?"-":""}${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
  const isPast = secs<0, isNow = abs<90;
  return (
    <span style={{ fontFamily:"'DM Mono',monospace", fontSize:sm?11:13, fontWeight:700,
      padding:sm?"2px 6px":"3px 10px", borderRadius:5, whiteSpace:"nowrap",
      background: isPast?C.redDim:isNow?C.goldDim:"rgba(255,255,255,0.04)",
      color: isPast?C.red:isNow?C.gold:C.muted,
      border:`1px solid ${isPast?C.redBorder:isNow?C.goldBorder:C.border}` }}>
      {txt}
    </span>
  );
}

// ─── Setup screen ──────────────────────────────────────────────────────────────
function SetupScreen({ onSetup }) {
  const [step, setStep] = useState(0);
  const [fbUrl, setFbUrl] = useState("https://YOUR-PROJECT-default-rtdb.firebaseio.com");
  const [code, setCode] = useState("");
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState("");

  async function connect() {
    if (!fbUrl.trim() || !code.trim()) { setErr("Remplis tous les champs."); return; }
    setLoading(true); setErr(""); initAudio();
    const data = await fbGet(fbUrl.trim(), code.trim());
    if (data === null) {
      const ok = await fbSet(fbUrl.trim(), code.trim(), { competitions:[], version:0 });
      if (!ok) { setErr("Connexion échouée. Vérifie l'URL et active le mode test dans Firebase."); setLoading(false); return; }
    }
    const cfg = { url: fbUrl.trim(), code: code.trim() };
    localStorage.setItem("defcon_cfg", JSON.stringify(cfg));
    onSetup(cfg);
  }

  if (step === 0) return (
    <div style={{ flex:1, overflowY:"auto", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:"28px 20px", gap:22 }}>
      <div style={{ textAlign:"center" }}>
        <div style={{ fontSize:44, marginBottom:10 }}>🏋️</div>
        <div style={{ fontSize:26, fontWeight:800, color:C.text, letterSpacing:"0.01em" }}>DEFCON</div>
        <div style={{ fontSize:12, color:C.muted, letterSpacing:"0.18em", marginTop:2 }}>MEET PLANNER</div>
      </div>

      <div style={{ width:"100%", maxWidth:400, background:C.surface, border:`1px solid ${C.border}`, borderRadius:14, padding:"18px 16px" }}>
        <div style={{ fontSize:13, fontWeight:700, color:C.text, marginBottom:8 }}>Synchronisation multi-appareils</div>
        <div style={{ fontSize:12, color:C.muted, lineHeight:1.7 }}>
          L'app utilise <strong style={{color:C.text}}>Firebase Realtime Database</strong> (gratuit) pour synchroniser les données en temps réel entre tous les téléphones connectés.
          <br/><br/>
          <strong style={{color:C.gold}}>Setup en 2 minutes :</strong><br/>
          1. Va sur <a href="https://console.firebase.google.com" target="_blank" style={{color:C.gold}}>console.firebase.google.com</a><br/>
          2. Crée un projet → Realtime Database → mode test<br/>
          3. Copie l'URL de la base de données
        </div>
      </div>

      <div style={{ width:"100%", maxWidth:400, display:"flex", flexDirection:"column", gap:10 }}>
        <button onClick={() => setStep(1)} style={btnGold}>CONFIGURER FIREBASE →</button>
        <button onClick={() => { localStorage.setItem("defcon_cfg", JSON.stringify({offline:true})); onSetup({offline:true}); }}
          style={btnGhost}>Utiliser hors ligne (données locales uniquement)</button>
      </div>
    </div>
  );

  return (
    <div style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:"24px 20px", gap:16 }}>
      <div style={{ width:"100%", maxWidth:420, display:"flex", flexDirection:"column", gap:16 }}>
        <div style={{ fontSize:18, fontWeight:800, color:C.text }}>Connexion Firebase</div>

        <div>
          <div style={{ fontSize:10, color:C.muted, marginBottom:6, textTransform:"uppercase", letterSpacing:"0.12em" }}>URL Realtime Database</div>
          <input value={fbUrl} onChange={e=>setFbUrl(e.target.value)} style={inp} placeholder="https://xxx-rtdb.firebaseio.com" />
        </div>
        <div>
          <div style={{ fontSize:10, color:C.muted, marginBottom:6, textTransform:"uppercase", letterSpacing:"0.12em" }}>Code équipe</div>
          <input value={code} onChange={e=>setCode(e.target.value)} style={inp} placeholder="ex: teamrouge2025" />
          <div style={{ fontSize:11, color:C.muted, marginTop:5 }}>Tous les membres partagent le même code pour accéder aux données.</div>
        </div>

        {err && <div style={{ color:C.red, fontSize:12, padding:"10px 12px", background:C.redDim, borderRadius:8, border:`1px solid ${C.redBorder}` }}>{err}</div>}

        <button onClick={connect} disabled={loading} style={{ ...btnGold, opacity:loading?0.6:1 }}>
          {loading ? "CONNEXION…" : "SE CONNECTER"}
        </button>
        <button onClick={() => setStep(0)} style={btnGhost}>← Retour</button>
      </div>
    </div>
  );
}

// ─── Game plan editor ──────────────────────────────────────────────────────────
function GamePlanEditor({ gamePlan, opener, onChange }) {
  const attempts = [
    { key:"attempt2", label:"2ème essai" },
    { key:"attempt3", label:"3ème essai" },
  ];
  return (
    <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
      <div style={{ fontSize:12, color:C.muted, padding:"10px 12px", background:"rgba(255,255,255,0.02)", borderRadius:8, border:`1px solid ${C.border}`, lineHeight:1.6 }}>
        📋 Plan de match — indicatif pour le coach uniquement, sans impact sur le timing
        {opener && <div style={{ marginTop:4, color:C.gold, fontFamily:"'DM Mono',monospace", fontSize:14 }}>Opener : {opener} kg</div>}
      </div>
      {attempts.map(att => (
        <div key={att.key}>
          <div style={{ fontSize:10, color:C.muted, textTransform:"uppercase", letterSpacing:"0.12em", marginBottom:8, fontWeight:700 }}>{att.label}</div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8 }}>
            {PLANS.map(p => (
              <div key={p.key} style={{ display:"flex", flexDirection:"column", gap:5 }}>
                <div style={{ fontSize:10, color:p.color, fontWeight:700, textAlign:"center", letterSpacing:"0.06em" }}>{p.label}</div>
                <input type="number" value={gamePlan?.[att.key]?.[p.key]||""} placeholder="—"
                  onChange={e => onChange({ ...gamePlan, [att.key]: { ...(gamePlan?.[att.key]||{}), [p.key]: e.target.value } })}
                  style={{ ...inp, textAlign:"center", padding:"10px 6px", fontSize:16, borderColor:`${p.color}22` }} />
                <div style={{ fontSize:9, color:C.muted, textAlign:"center" }}>kg</div>
              </div>
            ))}
          </div>
        </div>
      ))}
    </div>
  );
}

// ─── Movement editor ───────────────────────────────────────────────────────────
function MovementEditor({ mov, movKey, onUpdate }) {
  const [tab, setTab] = useState("warmup");
  const mi = MOVEMENTS.find(m => m.key === movKey);
  const schedule = computeSchedule(mov, 0);
  const liftMin = timeToMinutes(mov.compStartTime) + (mov.position - 1);
  const first = schedule[0];

  const upd = (k, v) => onUpdate({ ...mov, [k]: v });
  const updSet = (i, v) => onUpdate({ ...mov, warmupSets: mov.warmupSets.map((s,ii)=>ii===i?{...s,weight:v}:s) });
  const rmSet = i => onUpdate({ ...mov, warmupSets: mov.warmupSets.filter((_,ii)=>ii!==i) });
  const addSet = () => onUpdate({ ...mov, warmupSets: [...mov.warmupSets, {id:uid(),weight:0}] });

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
      {/* Summary bar */}
      {first && (
        <div style={{ display:"flex", gap:14, padding:"12px 14px", background:`${mi.color}0E`,
          borderRadius:10, border:`1px solid ${mi.color}30`, flexWrap:"wrap", alignItems:"center" }}>
          <div>
            <div style={{ fontSize:9, color:C.muted, textTransform:"uppercase", letterSpacing:"0.1em" }}>1ère barre</div>
            <div style={{ fontFamily:"'DM Mono',monospace", fontSize:22, fontWeight:700, color:mi.color }}>{first.startTime}</div>
          </div>
          <div style={{ width:1, height:34, background:`${mi.color}33` }}/>
          <div>
            <div style={{ fontSize:9, color:C.muted, textTransform:"uppercase", letterSpacing:"0.1em" }}>Passage</div>
            <div style={{ fontFamily:"'DM Mono',monospace", fontSize:22, fontWeight:700, color:"#e0966b" }}>{minutesToTime(liftMin)}</div>
          </div>
          {mov.openerWeight && <>
            <div style={{ width:1, height:34, background:`${mi.color}33` }}/>
            <div>
              <div style={{ fontSize:9, color:C.muted, textTransform:"uppercase", letterSpacing:"0.1em" }}>Opener</div>
              <div style={{ fontFamily:"'DM Mono',monospace", fontSize:22, fontWeight:700, color:mi.color }}>{mov.openerWeight} kg</div>
            </div>
          </>}
          <div style={{ marginLeft:"auto" }}><Countdown targetMin={first.startMin} /></div>
        </div>
      )}

      {/* Settings grid */}
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
        {[
          { label:"Début compét.", type:"time", key:"compStartTime" },
          { label:"Position (ordre)", type:"number", key:"position", min:1, max:99 },
          { label:"Repos (min)", type:"number", key:"restBetween", min:1, max:30 },
          { label:"Durée série (min)", type:"number", key:"setDuration", min:0.5, max:10, step:0.5 },
          { label:"Buffer opener (min)", type:"number", key:"bufferBeforeOpener", min:1, max:30 },
          { label:"Opener (kg)", type:"number", key:"openerWeight", min:0 },
        ].map(({ label, type, key, min, max, step }) => (
          <div key={key}>
            <div style={{ fontSize:10, color:C.muted, marginBottom:5, textTransform:"uppercase", letterSpacing:"0.09em" }}>{label}</div>
            <input type={type} value={mov[key]} min={min} max={max} step={step}
              onChange={e => upd(key, type==="number" ? (step ? parseFloat(e.target.value)||0 : +e.target.value) : e.target.value)}
              style={{ ...inp, fontSize:14, padding:"10px 10px" }} />
          </div>
        ))}
      </div>

      {/* Tabs */}
      <div style={{ display:"flex", background:"rgba(0,0,0,0.25)", borderRadius:10, padding:3, gap:3 }}>
        {[{k:"warmup",l:"📊 Barres d'échauffement"},{k:"plan",l:"📋 Plan de match"}].map(t => (
          <button key={t.k} onClick={()=>setTab(t.k)}
            style={{ flex:1, padding:"9px 8px", borderRadius:8, border:"none", fontSize:12, fontWeight:600,
              background: tab===t.k ? "rgba(255,255,255,0.08)" : "transparent",
              color: tab===t.k ? C.text : C.muted }}>
            {t.l}
          </button>
        ))}
      </div>

      {tab === "warmup" && (
        <div style={{ display:"flex", flexDirection:"column", gap:7 }}>
          <div style={{ display:"grid", gridTemplateColumns:"26px 1fr 76px 90px 36px", gap:8, padding:"0 8px" }}>
            {["#","Poids","Horaire","Countdown",""].map(h=>(
              <div key={h} style={{ fontSize:9, color:C.muted, textTransform:"uppercase", letterSpacing:"0.1em" }}>{h}</div>
            ))}
          </div>

          {mov.warmupSets.map((set, i) => {
            const sc = schedule[i];
            return (
              <div key={set.id} style={{ display:"grid", gridTemplateColumns:"26px 1fr 76px 90px 36px", gap:8, alignItems:"center",
                padding:"10px 8px", borderRadius:8, background:C.surface, border:`1px solid ${C.border}` }}>
                <span style={{ fontFamily:"'DM Mono',monospace", fontSize:12, color:C.muted, textAlign:"center" }}>{i+1}</span>
                <div style={{ display:"flex", alignItems:"center", gap:5 }}>
                  <input type="number" value={set.weight} onChange={e=>updSet(i,+e.target.value)}
                    style={{ ...inp, width:68, fontSize:15, padding:"8px 8px", textAlign:"center" }} />
                  <span style={{ fontSize:11, color:C.muted }}>kg</span>
                </div>
                {sc
                  ? <><span style={{ fontFamily:"'DM Mono',monospace", fontSize:13, color:C.text }}>{sc.startTime}</span><Countdown targetMin={sc.startMin} sm /></>
                  : <><span style={{ color:C.muted, fontSize:11 }}>—</span><span/></>
                }
                <button onClick={()=>rmSet(i)} style={{ ...btnDanger, padding:"7px 8px", fontSize:13 }}>✕</button>
              </div>
            );
          })}

          {mov.openerWeight && schedule.length > 0 && (
            <div style={{ display:"grid", gridTemplateColumns:"26px 1fr 76px 90px 36px", gap:8, alignItems:"center",
              padding:"10px 8px", borderRadius:8, background:`${mi.color}08`, border:`1px dashed ${mi.color}35` }}>
              <span style={{ color:mi.color, fontSize:13, textAlign:"center" }}>★</span>

// ─── Launch athlete card ───────────────────────────────────────────────────────
function LaunchCard({ athlete, onUpdate, onPosUp, onPosDown, canUp, canDown, delay, notifGranted }) {
  const movKey = athlete.currentMovement || "squat";
  const mov = athlete.movements[movKey];
  const mi = MOVEMENTS.find(m => m.key === movKey);
  const schedule = computeSchedule(mov, delay);
  const liftMin = timeToMinutes(mov?.compStartTime||"10:00") + (mov?.position||1) - 1 + delay;
  const doneSets = mov?.doneSets || {};
  const alertedRef = useRef({});
  const warnedRef = useRef({});

  // ─ Notification system (calibrated: fires at startMin ±3s)
  useEffect(() => {
    if (!schedule.length) return;
    const iv = setInterval(() => {
      const now = nowSeconds();
      schedule.forEach((sc, i) => {
        if (doneSets[i]) return;
        const diff = sc.startMin * 60 - now; // +future, -past

        // 30s warning
        if (diff <= 32 && diff > 24 && !warnedRef.current[i]) {
          warnedRef.current[i] = true;
          playWarn();
          if (notifGranted) try {
            new Notification(`⏱️ ${athlete.name} — ${mi.label} série ${i+1} dans 30s`, {
              body:`Prépare-toi ! ${sc.weight} kg`, tag:`w-${athlete.id}-${i}`, silent:false
            });
          } catch(e) {}
        }
        // Exact alert (fires between -3s and +5s of start time)
        if (diff <= 3 && diff > -8 && !alertedRef.current[i]) {
          alertedRef.current[i] = true;
          playAlert();
          if (notifGranted) try {
            new Notification(`🚨 ${athlete.name} — ${mi.label}`, {
              body:`C'est l'heure ! Série ${i+1} à ${sc.weight} kg`, tag:`a-${athlete.id}-${i}`, requireInteraction:true
            });
          } catch(e) {}
        }
        // Reset after 40s past
        if (diff < -40) { delete alertedRef.current[i]; delete warnedRef.current[i]; }
      });
    }, 500);
    return () => clearInterval(iv);
  }, [schedule, doneSets, athlete.id, athlete.name, mi.label, notifGranted]);

  const toggleDone = i => {
    const next = { ...doneSets, [i]: !doneSets[i] };
    onUpdate({ ...athlete, movements:{ ...athlete.movements, [movKey]:{ ...mov, doneSets:next } } });
  };
  const allDone = schedule.length > 0 && schedule.every((_,i) => doneSets[i]);
  const nextIdx = schedule.findIndex((_,i) => !doneSets[i]);
  const movIdx = MOV_ORDER.indexOf(movKey);
  const hasNext = movIdx < MOV_ORDER.length - 1;

  return (
    <div style={{ background:C.surface, border:`1px solid ${allDone ? C.greenBorder : C.border}`, borderRadius:13, overflow:"hidden", transition:"border-color 0.3s" }}>
      {/* Header */}
      <div style={{ display:"flex", alignItems:"center", gap:10, padding:"12px 14px",
        background: allDone ? C.greenDim : "rgba(0,0,0,0.25)", borderBottom:`1px solid ${C.border}` }}>
        <div style={{ width:8, height:8, borderRadius:"50%", flexShrink:0,
          background: allDone ? C.green : nextIdx===0 ? mi.color : C.muted }} />
        <span style={{ fontWeight:700, fontSize:15, flex:1, color:C.text }}>{athlete.name}</span>

        <span style={{ fontSize:11, fontWeight:700, color:mi.color, background:`${mi.color}15`,
          border:`1px solid ${mi.color}30`, padding:"2px 8px", borderRadius:5 }}>{mi.short}</span>

        <div style={{ display:"flex", alignItems:"center", gap:3 }}>
          <button disabled={!canUp} onClick={onPosUp}
            style={{ width:28, height:28, borderRadius:5, border:`1px solid ${C.border}`, background:"rgba(255,255,255,0.04)",
              color:canUp?C.text:C.muted, cursor:canUp?"pointer":"default", fontSize:13, display:"flex", alignItems:"center", justifyContent:"center" }}>↑</button>
          <span style={{ fontFamily:"'DM Mono',monospace", fontSize:12, color:C.gold, minWidth:18, textAlign:"center" }}>{mov?.position||1}</span>
          <button disabled={!canDown} onClick={onPosDown}
            style={{ width:28, height:28, borderRadius:5, border:`1px solid ${C.border}`, background:"rgba(255,255,255,0.04)",
              color:canDown?C.text:C.muted, cursor:canDown?"pointer":"default", fontSize:13, display:"flex", alignItems:"center", justifyContent:"center" }}>↓</button>
        </div>

        <div style={{ textAlign:"right" }}>
          <div style={{ fontSize:9, color:C.muted, textTransform:"uppercase", letterSpacing:"0.08em" }}>Passage</div>
          <div style={{ fontFamily:"'DM Mono',monospace", fontSize:15, fontWeight:700, color:"#e0966b" }}>{minutesToTime(liftMin)}</div>
        </div>
      </div>

      {/* Sets */}
      <div style={{ padding:"10px 12px", display:"flex", flexDirection:"column", gap:6 }}>
        {schedule.map((sc, i) => {
          const isDone = !!doneSets[i];
          const isNext = i === nextIdx && !allDone;
          const diff = sc.startMin * 60 - nowSeconds();
          const isUrgent = !isDone && Math.abs(diff) < 90;
          return (
            <div key={sc.id||i} style={{ display:"grid", gridTemplateColumns:"24px 1fr auto auto 36px", gap:8, alignItems:"center",
              padding:"9px 10px", borderRadius:8, transition:"all 0.2s",
              background: isDone ? C.greenDim : isUrgent ? C.goldDim : isNext ? "rgba(255,255,255,0.04)" : "transparent",
              border:`1px solid ${isDone ? C.greenBorder : isUrgent ? C.goldBorder : isNext ? C.border2 : "transparent"}`,
              opacity: isDone ? 0.5 : 1 }}>
              <span style={{ fontFamily:"'DM Mono',monospace", fontSize:11, color:C.muted, textAlign:"center" }}>{i+1}</span>
              <span style={{ fontFamily:"'DM Mono',monospace", fontSize:15, fontWeight:isDone?400:600,
                color: isDone?C.muted:isNext?mi.color:C.text, textDecoration:isDone?"line-through":"none" }}>
                {sc.weight} <span style={{ fontSize:11, color:C.muted, fontWeight:400 }}>kg</span>
              </span>
              <span style={{ fontFamily:"'DM Mono',monospace", fontSize:12, color:isDone?C.muted:C.text }}>{sc.startTime}</span>
              {isDone
                ? <span style={{ fontSize:11, color:C.green, fontWeight:700 }}>Fait ✓</span>
                : <Countdown targetMin={sc.startMin} sm />
              }
              <button onClick={()=>toggleDone(i)}
                style={{ width:32, height:32, borderRadius:7, display:"flex", alignItems:"center", justifyContent:"center",
                  background:isDone?C.greenDim:"rgba(255,255,255,0.04)",
                  border:`1px solid ${isDone?C.greenBorder:C.border}`,
                  color:isDone?C.green:C.muted, fontSize:15 }}>
                {isDone?"✓":"○"}
              </button>
            </div>
          );
        })}

        {mov?.openerWeight && (
          <div style={{ display:"grid", gridTemplateColumns:"24px 1fr auto auto 36px", gap:8, alignItems:"center",
            padding:"9px 10px", borderRadius:8, background:`${mi.color}08`, border:`1px dashed ${mi.color}35` }}>
            <span style={{ color:mi.color, fontSize:12, textAlign:"center" }}>★</span>
            <span style={{ fontFamily:"'DM Mono',monospace", fontSize:15, fontWeight:600, color:mi.color }}>
              {mov.openerWeight} <span style={{ fontSize:11, color:C.muted, fontWeight:400 }}>kg</span>
              <span style={{ fontSize:10, color:C.muted, marginLeft:5 }}>opener</span>
            </span>
            <span style={{ fontFamily:"'DM Mono',monospace", fontSize:12, color:"#e0966b" }}>{minutesToTime(liftMin)}</span>
            <Countdown targetMin={liftMin} sm />
            <span/>
          </div>
        )}

        {/* Game plan preview (launch mode) */}
        {mov?.openerWeight && (
          <details style={{ marginTop:2 }}>
            <summary style={{ cursor:"pointer", fontSize:11, color:C.muted, letterSpacing:"0.08em", padding:"4px 0", listStyle:"none", display:"flex", alignItems:"center", gap:4 }}>
              <span>▸</span> PLAN DE MATCH
            </summary>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:6, marginTop:8 }}>
              {PLANS.map(p => (
                <div key={p.key} style={{ background:`${p.color}0A`, border:`1px solid ${p.color}22`, borderRadius:7, padding:"8px 6px" }}>
                  <div style={{ fontSize:9, color:p.color, fontWeight:700, textAlign:"center", marginBottom:6, letterSpacing:"0.06em" }}>{p.label.toUpperCase()}</div>
                  {[
                    { k:"attempt2", l:"2ème" },
                    { k:"attempt3", l:"3ème" },
                  ].map(a => (
                    <div key={a.k} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:3 }}>
                      <span style={{ fontSize:9, color:C.muted }}>{a.l}</span>
                      <span style={{ fontFamily:"'DM Mono',monospace", fontSize:12, fontWeight:600, color:p.color }}>
                        {mov?.gamePlan?.[a.k]?.[p.key] || "—"}{mov?.gamePlan?.[a.k]?.[p.key] ? " kg" : ""}
                      </span>
                    </div>
                  ))}
                </div>
              ))}
            </div>
          </details>
        )}

        {allDone && hasNext && (
          <button onClick={()=>onUpdate({...athlete,currentMovement:MOV_ORDER[movIdx+1]})}
            style={{ ...btnGold, marginTop:6, fontSize:13, padding:"12px" }}>
            → Passer au {MOVEMENTS.find(m=>m.key===MOV_ORDER[movIdx+1])?.label}
          </button>
        )}
        {allDone && !hasNext && (
          <div style={{ textAlign:"center", padding:"10px", color:C.green, fontSize:13, fontWeight:700 }}>✅ Tous les mouvements terminés !</div>
        )}
      </div>
    </div>
  );
}

// ─── Main App ──────────────────────────────────────────────────────────────────
function App() {
  const [config, setConfig] = useState(undefined); // undefined=loading
  const [comps, setComps] = useState([]);
  const [selCompId, setSelCompId] = useState(null);
  const [selAthleteId, setSelAthleteId] = useState(null);
  const [launchMode, setLaunchMode] = useState(false);
  const [notifGranted, setNotifGranted] = useState(Notification?.permission === "granted");
  const [clock, setClock] = useState("");
  const [delay, setDelay] = useState(0);
  const [delayInp, setDelayInp] = useState("0");
  const [syncing, setSyncing] = useState(false);
  const [syncErr, setSyncErr] = useState(false);
  const [mobileView, setMobileView] = useState("competitions"); // competitions|athletes|athlete
  const [showSettings, setShowSettings] = useState(false);
  const [winW, setWinW] = useState(window.innerWidth);

  const isDirty = useRef(false);
  const saveTimer = useRef(null);
  const esRef = useRef(null);

  const isMobile = winW < 768;

  // Window resize
  useEffect(() => {
    const h = () => setWinW(window.innerWidth);
    window.addEventListener("resize", h);
    return () => window.removeEventListener("resize", h);
  }, []);

  // Clock
  useEffect(() => {
    const tick = () => {
      const n = new Date();
      setClock(`${String(n.getHours()).padStart(2,"0")}:${String(n.getMinutes()).padStart(2,"0")}:${String(n.getSeconds()).padStart(2,"0")}`);
    };
    tick(); const iv = setInterval(tick, 1000); return () => clearInterval(iv);
  }, []);

  // Load config
  useEffect(() => {
    const s = localStorage.getItem("defcon_cfg");
    if (s) { try { setConfig(JSON.parse(s)); } catch { setConfig(null); } }
    else setConfig(null);
  }, []);

  // Load data + SSE
  useEffect(() => {
    if (config === undefined || config === null) return;

    const applyData = (data) => {
      if (!data?.competitions) return false;
      setComps(data.competitions);
      if (!selCompId && data.competitions.length) {
        setSelCompId(data.competitions[0].id);
        setSelAthleteId(data.competitions[0].athletes?.[0]?.id || null);
      }
      return true;
    };

    if (config.offline) {
      const s = localStorage.getItem("defcon_data");
      if (s) { try { applyData(JSON.parse(s)); } catch {} }
      if (!s) {
        const init = [defaultComp("Ma première compétition")];
        setComps(init); setSelCompId(init[0].id); setSelAthleteId(init[0].athletes[0].id);
      }
      return;
    }

    // Firebase: initial load
    fbGet(config.url, config.code).then(data => {
      if (!applyData(data)) {
        const init = [defaultComp("Ma première compétition")];
        setComps(init); setSelCompId(init[0].id); setSelAthleteId(init[0].athletes[0].id);
      }
    });

    // SSE realtime
    const url = `${config.url}/teams/${encodeURIComponent(config.code)}.json?alt=sse`;
    const es = new EventSource(url);
    esRef.current = es;
    es.addEventListener("put", e => {
      try {
        const { data } = JSON.parse(e.data);
        if (!data?.competitions) return;
        // Only apply if WE didn't just write this (isDirty guard)
        if (!isDirty.current) applyData(data);
      } catch {}
    });
    es.onerror = () => setSyncErr(true);
    es.onopen = () => setSyncErr(false);
    return () => { es.close(); esRef.current = null; };
  }, [config]);

  // Save (debounced, only on dirty local changes)
  useEffect(() => {
    if (!isDirty.current || !config || !comps.length) return;
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => {
      const payload = { competitions: comps, version: Date.now() };
      if (config.offline) {
        localStorage.setItem("defcon_data", JSON.stringify(payload));
        isDirty.current = false; return;
      }
      setSyncing(true);
      fbSet(config.url, config.code, payload).then(ok => {
        setSyncing(false); setSyncErr(!ok);
        isDirty.current = false;
      });
    }, 700);
  }, [comps, config]);

  // Notification permission
  async function reqNotifs() {
    initAudio();
    if ("Notification" in window) {
      const p = await Notification.requestPermission();
      setNotifGranted(p === "granted");
    }
  }

  // ─ Data helpers
  function markDirty() { isDirty.current = true; }
  const selComp = comps.find(c => c.id === selCompId);

  function updComp(updated) { markDirty(); setComps(prev => prev.map(c => c.id===updated.id?updated:c)); }
  function addComp() {
    const c = defaultComp(); markDirty();
    setComps(prev => [...prev, c]);
    setSelCompId(c.id); setSelAthleteId(c.athletes[0].id);
    setLaunchMode(false); setMobileView("athletes");
  }
  function rmComp(id) {
    markDirty();
    setComps(prev => {
      const next = prev.filter(c => c.id !== id);
      if (selCompId === id && next.length) { setSelCompId(next[0].id); setSelAthleteId(next[0].athletes?.[0]?.id||null); }
      return next;
    });
  }
  function addAthlete() {
    if (!selComp) return;
    const a = defaultAthlete(); markDirty();
    updComp({...selComp, athletes:[...selComp.athletes, a]});
    setSelAthleteId(a.id); setMobileView("athlete");
  }
  function updAthlete(a) { if (!selComp) return; markDirty(); updComp({...selComp, athletes:selComp.athletes.map(x=>x.id===a.id?a:x)}); }
  function rmAthlete(id) {
    if (!selComp) return; markDirty();
    const next = selComp.athletes.filter(a=>a.id!==id);
    updComp({...selComp, athletes:next});
    if (selAthleteId===id) setSelAthleteId(next[0]?.id||null);
    setMobileView("athletes");
  }
  function movPos(id, dir) {
    if (!selComp) return; markDirty();
    updComp({...selComp, athletes:selComp.athletes.map(a => {
      if (a.id!==id) return a;
      const mk = a.currentMovement||"squat";
      const op = a.movements[mk]?.position||1;
      return {...a, movements:{...a.movements, [mk]:{...a.movements[mk], position:dir==="up"?Math.max(1,op-1):op+1}}};
    })});
  }
  function setAllMovStart(movKey, time) {
    if (!selComp) return; markDirty();
    updComp({...selComp, athletes:selComp.athletes.map(a=>({...a, movements:{...a.movements, [movKey]:{...a.movements[movKey], compStartTime:time}}}))});
  }

  const days = selComp ? daysUntil(selComp.date) : null;
  const sorted = selComp ? [...selComp.athletes].sort((a,b) => {
    const ak = a.currentMovement||"squat", bk = b.currentMovement||"squat";
    return (a.movements[ak]?.position||1) - (b.movements[bk]?.position||1);
  }) : [];

  // ─── Setup screen
  if (config === undefined) return (
    <div style={{ height:"100dvh", background:C.bg, display:"flex", alignItems:"center", justifyContent:"center", color:C.text }}>
      <div style={{ fontSize:13, color:C.muted }}>Chargement…</div>
    </div>
  );
  if (config === null) return (
    <div style={{ height:"100dvh", background:C.bg, color:C.text, display:"flex", flexDirection:"column" }}>
      <SetupScreen onSetup={cfg => setConfig(cfg)} />
    </div>
  );

  const HEADER_H = 50;
  const BOTTOM_H = isMobile ? 60 : 0;

  return (
    <div style={{ height:"100dvh", background:C.bg, color:C.text, display:"flex", flexDirection:"column", fontFamily:"'Syne',sans-serif", overflow:"hidden" }}>

      {showSettings && <SettingsModal config={config} onClose={()=>setShowSettings(false)}
        onReset={()=>{ localStorage.removeItem("defcon_cfg"); setConfig(null); setShowSettings(false); }} />}

      {/* ─ Header */}
      <header style={{ height:HEADER_H, display:"flex", alignItems:"center", justifyContent:"space-between",
        padding:"0 14px", borderBottom:`1px solid ${C.border}`,
        background:"rgba(6,10,16,0.96)", backdropFilter:"blur(12px)", flexShrink:0, zIndex:20, gap:10 }}>
        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
          <div style={{ width:20, height:20, borderRadius:5, background:C.gold, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
            <div style={{ width:9, height:9, border:"2px solid rgba(0,0,0,0.45)", borderRadius:2 }} />
          </div>
          <div>
            <span style={{ fontWeight:800, fontSize:13, color:C.text }}>DEFCON</span>
            <span style={{ fontWeight:400, fontSize:10, color:C.muted, marginLeft:5, letterSpacing:"0.05em" }}>MEET PLANNER</span>
          </div>
          {launchMode && <span style={{ fontSize:9, background:C.redDim, color:C.red, padding:"2px 6px", borderRadius:3, letterSpacing:"0.1em", fontWeight:700 }}>LIVE</span>}
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:10 }}>
          <span style={{ fontFamily:"'DM Mono',monospace", fontSize:16, fontWeight:600, color:C.gold }}>{clock}</span>
          {!config.offline && (
            <div style={{ width:6, height:6, borderRadius:"50%", flexShrink:0,
              background: syncErr ? C.red : syncing ? C.gold : C.green,
              title: syncErr?"Erreur sync":syncing?"Sync…":"Sync OK" }} />
          )}
          <button onClick={reqNotifs}
            style={{ background:notifGranted?C.greenDim:C.goldDim,
              border:`1px solid ${notifGranted?C.greenBorder:C.goldBorder}`,
              borderRadius:6, color:notifGranted?C.green:C.gold,
              fontSize:11, padding:"5px 9px", fontWeight:600, letterSpacing:"0.04em" }}>
            {notifGranted ? "🔔" : "🔕 NOTIFS"}
          </button>
          <button onClick={()=>setShowSettings(true)}
            style={{ background:"rgba(255,255,255,0.04)", border:`1px solid ${C.border}`,
              borderRadius:6, color:C.muted, fontSize:14, padding:"5px 8px", lineHeight:1 }}>⚙️</button>
        </div>
      </header>

      {/* ─ Body */}
      <div style={{ flex:1, display:"flex", overflow:"hidden", paddingBottom:BOTTOM_H }}>

        {/* ══ EDIT MODE ══════════════════════════════════════════════════════════ */}
        {!launchMode && <>

          {/* Competitions sidebar */}
          {(!isMobile || mobileView==="competitions") && (
            <aside style={{ width:isMobile?"100%":195, borderRight:isMobile?"none":`1px solid ${C.border}`,
              display:"flex", flexDirection:"column", background:"rgba(0,0,0,0.15)", flexShrink:0 }}>
              <div style={{ padding:"12px 12px 6px", fontSize:9, color:C.muted, textTransform:"uppercase", letterSpacing:"0.15em" }}>Compétitions</div>
              <div style={{ flex:1, overflowY:"auto", padding:"0 10px 10px" }}>
                {comps.map(c => {
                  const isA = c.id===selCompId;
                  const d = daysUntil(c.date);
                  return (
                    <div key={c.id} onClick={()=>{ setSelCompId(c.id); setSelAthleteId(c.athletes[0]?.id||null); if(isMobile)setMobileView("athletes"); initAudio(); }}
                      style={{ padding:"12px", borderRadius:9, cursor:"pointer", marginBottom:6,
                        background:isA?C.goldDim:C.surface, border:`1px solid ${isA?C.goldBorder:C.border}`, position:"relative" }}>
                      <div style={{ fontWeight:600, fontSize:14, color:isA?C.gold:"#98a6be", paddingRight:22 }}>{c.name}</div>
                      <div style={{ fontSize:11, color:C.muted, marginTop:3 }}>{c.date?formatDate(c.date):"Date non définie"}</div>
                      <div style={{ fontSize:11, color:C.muted, marginTop:1 }}>{c.athletes.length} athlète{c.athletes.length>1?"s":""}</div>
                      {d!==null && <div style={{ fontSize:10, marginTop:4, fontWeight:700,
                        color:d===0?C.red:d>0?C.gold:C.muted }}>
                        {d===0?"AUJOURD'HUI":d>0?`J-${d}`:`J+${Math.abs(d)}`}
                      </div>}
                      {comps.length>1 && <button onClick={e=>{e.stopPropagation();rmComp(c.id);}}
                        style={{ ...btnDanger, position:"absolute", top:8, right:8, padding:"2px 6px" }}>✕</button>}
                    </div>
                  );
                })}
              </div>
              <div style={{ padding:"8px 10px 14px", display:"flex", flexDirection:"column", gap:8 }}>
                <button onClick={addComp} style={btnGhost}>+ Nouvelle compét.</button>
                {isMobile && selComp && (
                  <button onClick={()=>{ setLaunchMode(true); initAudio(); setDelay(0); setDelayInp("0"); }} style={btnGold}>🚀 LANCER</button>
                )}
              </div>
            </aside>
          )}

          {/* Athletes list */}
          {(!isMobile || mobileView==="athletes") && selComp && (
            <div style={{ width:isMobile?"100%":170, borderRight:isMobile?"none":`1px solid ${C.border}`,
              display:"flex", flexDirection:"column", background:"rgba(0,0,0,0.08)", flexShrink:0 }}>
              {isMobile && (
                <div style={{ display:"flex", alignItems:"center", gap:8, padding:"10px 12px", borderBottom:`1px solid ${C.border}` }}>
                  <button onClick={()=>setMobileView("competitions")} style={{ ...btnSm, padding:"6px 10px" }}>←</button>
                  <span style={{ flex:1, fontWeight:700, fontSize:13, color:C.text, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{selComp.name}</span>
                  <button onClick={()=>{ setLaunchMode(true); initAudio(); }} style={{ ...btnGold, width:"auto", padding:"7px 12px", fontSize:12, borderRadius:7 }}>🚀</button>
                </div>
              )}
              {!isMobile && (
                <div style={{ padding:"10px 10px 6px" }}>
                  <div style={{ fontSize:9, color:C.muted, textTransform:"uppercase", letterSpacing:"0.15em", marginBottom:6 }}>Athlètes</div>
                  <button onClick={()=>{ setLaunchMode(true); initAudio(); setDelay(0); setDelayInp("0"); }}
                    style={{ ...btnGold, fontSize:11, padding:"8px" }}>🚀 LANCER</button>
                </div>
              )}
              <div style={{ flex:1, overflowY:"auto", padding:"4px 8px 8px" }}>
                {selComp.athletes.map(a => {
                  const isA = a.id===selAthleteId;
                  const mk = a.currentMovement||"squat";
                  const mi = MOVEMENTS.find(m=>m.key===mk);
                  const sc = computeSchedule(a.movements[mk],0);
                  return (
                    <div key={a.id} onClick={()=>{ setSelAthleteId(a.id); if(isMobile)setMobileView("athlete"); }}
                      style={{ padding:"10px 10px", borderRadius:7, cursor:"pointer", marginBottom:5,
                        background:isA?C.goldDim:C.surface, border:`1px solid ${isA?C.goldBorder:C.border}` }}>
                      <div style={{ fontSize:13, fontWeight:600, color:isA?C.gold:"#98a6be", display:"flex", alignItems:"center", gap:6, justifyContent:"space-between" }}>
                        {a.name}
                        <span style={{ fontSize:9, color:mi.color, background:`${mi.color}15`, padding:"1px 5px", borderRadius:3, fontWeight:700 }}>{mi.short}</span>
                      </div>
                      {sc[0] && <div style={{ fontSize:10, color:C.muted, fontFamily:"'DM Mono',monospace", marginTop:3 }}>{sc[0].startTime}</div>}
                    </div>
                  );
                })}
              </div>
              <div style={{ padding:"6px 8px 14px" }}>
                <button onClick={addAthlete} style={{ ...btnGhost, fontSize:12, padding:"9px" }}>+ Athlète</button>
              </div>
            </div>
          )}

          {/* Athlete editor panel */}
          {(!isMobile || mobileView==="athlete") && (
            <div style={{ flex:1, overflowY:"auto" }}>
              {isMobile && (
                <div style={{ display:"flex", alignItems:"center", gap:8, padding:"10px 12px", borderBottom:`1px solid ${C.border}`,
                  position:"sticky", top:0, background:"rgba(6,10,16,0.95)", zIndex:5 }}>
                  <button onClick={()=>setMobileView("athletes")} style={{ ...btnSm, padding:"6px 10px" }}>←</button>
                  <span style={{ flex:1, fontSize:12, color:C.muted }}>{selComp?.name}</span>
                </div>
              )}
              <div style={{ padding:"18px 16px" }}>
                {!selComp ? (
                  <div style={{ textAlign:"center", color:C.muted, marginTop:60, fontSize:14 }}>Sélectionne une compétition.</div>
                ) : !selComp.athletes.length ? (
                  <div style={{ textAlign:"center", color:C.muted, marginTop:60 }}>
                    <div style={{ marginBottom:16 }}>Aucun athlète.</div>
                    <button onClick={addAthlete} style={{ ...btnGold, maxWidth:260, margin:"0 auto" }}>+ Premier athlète</button>
                  </div>
                ) : (() => {
                  const ath = selComp.athletes.find(a=>a.id===selAthleteId);
                  if (!ath) return <div style={{ color:C.muted, marginTop:40, textAlign:"center" }}>Sélectionne un athlète.</div>;
                  return (
                    <AthleteEditor athlete={ath} onUpdate={updAthlete}
                      onRemove={()=>rmAthlete(ath.id)} canRemove={selComp.athletes.length>1} />
                  );
                })()}
              </div>
            </div>
          )}
        </>}

        {/* ══ LAUNCH MODE ════════════════════════════════════════════════════════ */}
        {launchMode && (
          <div style={{ flex:1, overflowY:"auto", padding:"14px 14px 20px" }}>
            <div style={{ maxWidth:700, margin:"0 auto", display:"flex", flexDirection:"column", gap:14 }}>

              {/* Back + title */}
              <div style={{ display:"flex", alignItems:"center", gap:10, flexWrap:"wrap" }}>
                <button onClick={()=>setLaunchMode(false)} style={{ ...btnSm, padding:"7px 12px" }}>← Édition</button>
                {selComp && <span style={{ fontWeight:700, fontSize:16, color:C.text, flex:1 }}>{selComp.name}</span>}
                {days!==null && <span style={{ fontSize:11, fontWeight:700, padding:"3px 10px", borderRadius:4,
                  background:days===0?C.redDim:C.goldDim, color:days===0?C.red:C.gold,
                  border:`1px solid ${days===0?C.redBorder:C.goldBorder}` }}>
                  {days===0?"AUJOURD'HUI":days>0?`J-${days}`:`J+${Math.abs(days)}`}
                </span>}
              </div>

              {/* Controls: delay + start times */}
              <div style={{ padding:"14px", background:delay>0?C.redDim:"rgba(255,255,255,0.02)",
                border:`1px solid ${delay>0?C.redBorder:C.border}`, borderRadius:11 }}>
                {/* Delay row */}
                <div style={{ display:"flex", alignItems:"center", gap:8, flexWrap:"wrap", marginBottom:12 }}>
                  <span style={{ fontSize:10, color:C.muted, textTransform:"uppercase", letterSpacing:"0.1em", flexShrink:0 }}>Retard</span>
                  <div style={{ display:"flex", gap:5, flexWrap:"wrap" }}>
                    {[5,10,15,20,30].map(n=>(
                      <button key={n} onClick={()=>{ const nd=delay+n; setDelay(nd); setDelayInp(String(nd)); }}
                        style={{ ...btnSm, fontFamily:"'DM Mono',monospace", padding:"5px 9px" }}>+{n}</button>
                    ))}
                  </div>
                  <div style={{ display:"flex", alignItems:"center", gap:5 }}>
                    <input type="number" value={delayInp} min={0}
                      onChange={e=>setDelayInp(e.target.value)}
                      onBlur={()=>{ const v=parseInt(delayInp)||0; setDelay(v); setDelayInp(String(v)); }}
                      style={{ ...inp, width:58, padding:"6px 8px", fontSize:14, textAlign:"center" }} />
                    <span style={{ fontSize:11, color:C.muted }}>min</span>
                  </div>
                  {delay>0 && <>
                    <span style={{ fontFamily:"'DM Mono',monospace", fontSize:15, fontWeight:700, color:C.red }}>+{delay} min</span>
                    <button onClick={()=>{ setDelay(0); setDelayInp("0"); }}
                      style={{ background:"transparent", border:"none", color:C.muted, fontSize:12, padding:"2px 6px" }}>Réinitialiser</button>
                  </>}
                </div>

                {/* Movement start times */}
                {selComp && (
                  <div>
                    <div style={{ fontSize:9, color:C.muted, textTransform:"uppercase", letterSpacing:"0.12em", marginBottom:8 }}>Horaires de début par mouvement</div>
                    <div style={{ display:"flex", gap:10, flexWrap:"wrap" }}>
                      {MOVEMENTS.map(m => {
                        const startTime = selComp.athletes[0]?.movements?.[m.key]?.compStartTime || "10:00";
                        return (
                          <div key={m.key}>
                            <div style={{ fontSize:9, color:m.color, fontWeight:700, marginBottom:4, letterSpacing:"0.08em" }}>{m.label.toUpperCase()}</div>
                            <input type="time" value={startTime}
                              onChange={e => { markDirty(); setAllMovStart(m.key, e.target.value); }}
                              style={{ ...inp, width:"auto", padding:"7px 10px", fontSize:14, borderColor:`${m.color}25` }} />
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}
              </div>

              {/* Athlete cards */}
              {sorted.map(a => {
                const mk = a.currentMovement||"squat";
                const maxPos = Math.max(...(selComp?.athletes||[]).map(x=>(x.movements[mk]?.position||1)),0);
                return (
                  <LaunchCard key={a.id} athlete={a}
                    onUpdate={updAthlete}
                    onPosUp={()=>movPos(a.id,"up")} onPosDown={()=>movPos(a.id,"down")}
                    canUp={(a.movements[mk]?.position||1)>1}
                    canDown={(a.movements[mk]?.position||1)<maxPos+1}
                    delay={delay} notifGranted={notifGranted} />
                );
              })}
              {(!sorted.length) && (
                <div style={{ textAlign:"center", color:C.muted, fontSize:13, padding:"40px 0" }}>Aucun athlète configuré.</div>
              )}
            </div>
          </div>
        )}
      </div>

      {/* ─ Mobile bottom nav */}
      {isMobile && !launchMode && (
        <div style={{ position:"fixed", bottom:0, left:0, right:0, height:BOTTOM_H,
          background:"rgba(6,10,16,0.97)", borderTop:`1px solid ${C.border}`,
          display:"flex", backdropFilter:"blur(12px)", zIndex:30 }}>
          {[
            { id:"competitions", icon:"🏆", label:"Compétitions" },
            { id:"athletes", icon:"🏋️", label:"Athlètes" },
            { id:"athlete", icon:"✏️", label:"Éditer" },
          ].map(tab => (
            <button key={tab.id} onClick={()=>setMobileView(tab.id)}
              style={{ flex:1, background:"transparent", border:"none", display:"flex",
                flexDirection:"column", alignItems:"center", justifyContent:"center", gap:3,
                color: mobileView===tab.id ? C.gold : C.muted, padding:"6px 0" }}>
              <span style={{ fontSize:18 }}>{tab.icon}</span>
              <span style={{ fontSize:10, fontWeight:600, letterSpacing:"0.04em" }}>{tab.label}</span>
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
