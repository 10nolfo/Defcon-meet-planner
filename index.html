                    style={{padding:"8px 10px",background:"transparent",border:"none",borderLeft:`1px solid ${C.border}`,
                      color:isGroupSel?C.blue:C.muted,fontSize:13,cursor:"pointer",flexShrink:0,
                      height:"100%",display:"flex",alignItems:"center"}}>⚙️</button>
                </div>
                {open && (
                  <div style={{
                    background:C.surface,
                    border:`1px solid ${isGroupSel?C.blueBorder:hasSelectedAthlete?C.goldBorder:C.border}`,
                    borderTop:"none",borderRadius:"0 0 8px 8px",
                    padding:"6px 6px 6px",display:"flex",flexDirection:"column",gap:4,
                  }}>
                    {groupAthletes.length === 0 && (
                      <div style={{fontSize:11,color:C.muted,textAlign:"center",padding:"6px 0 2px",fontStyle:"italic"}}>Aucun athlète</div>
                    )}
                    {groupAthletes.map(a => {
                      const isA = a.id === selAthleteId;
                      const mk = a.currentMovement || "squat";
                      const mc = movColor(C, mk);
                      const cst = getMovStartTime(selComp, a.groupId, mk);
                      const athMov = a.movements[mk] || defaultMovement();
                      const sc = computeSchedule(athMov, cst, athMov.position||1, 0);
                      const firstSc = sc.find(s => s.type === "general") || sc[0];
                      return (
                        <div key={a.id} onClick={()=>{setSelAthleteId(a.id);setSelGroupId(null);if(isMobile)setMobileScreen("editor");}}
                          style={{padding:"9px 10px",borderRadius:6,cursor:"pointer",
                            background:isA?C.goldDim:C.surface2,
                            border:`1px solid ${isA?C.goldBorder:C.border}`}}>
                          <div style={{fontSize:13,fontWeight:600,color:isA?C.gold:C.text,
                            display:"flex",alignItems:"center",gap:6,justifyContent:"space-between"}}>
                            <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a.name}</span>
                            <div style={{display:"flex",alignItems:"center",gap:5,flexShrink:0}}>
                              <span style={{fontSize:9,color:C.muted,fontFamily:"'DM Mono',monospace"}}>#{a.movements[mk]?.position||1}</span>
                              <span style={{fontSize:9,color:mc,background:`${mc}15`,
                                padding:"1px 5px",borderRadius:3,fontWeight:700}}>{mk==="squat"?"SQ":mk==="bench"?"BP":"DL"}</span>
                            </div>
                          </div>
                          {firstSc&&<div style={{fontSize:10,color:C.muted,fontFamily:"'DM Mono',monospace",marginTop:2}}>{firstSc.startTime}</div>}
                        </div>
                      );

                    <button onClick={e=>{e.stopPropagation();addAthleteToGroup(group.id);}}
                      style={{background:C.greenDim, border:`1px dashed ${C.greenBorder}`, borderRadius:7,
                        color:C.green, fontSize:11, fontWeight:700, padding:"6px 8px", width:"100%",

                      + Athlète
                    </button>
                  </div>
                )}
              </div>
            );
          })}

          {selComp&&(
            <div style={{marginTop:10,paddingTop:10,borderTop:`1px solid ${C.border}`}}>
              <div style={{fontSize:9,color:C.muted,textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:6}}>Date de compétition</div>
              <input type="date" value={selComp.date||""} onChange={e=>{markDirty();updComp({...selComp,date:e.target.value});}}
                style={{...inp,fontSize:12,padding:"8px 10px"}}/>
            </div>
          )}
          {selComp&&(
            <div style={{marginTop:12,paddingTop:10,borderTop:`1px solid ${C.border}`}}>
              <GroupsManager comp={selComp} onUpdate={c=>{markDirty();setComps(prev=>prev.map(x=>x.id===c.id?c:x));}}/>
            </div>
          )}
        </div>

      </div>
    );
  };

  // ─ Panel éditeur (athlète ou groupe)
  const EditorPanel = ()=>{
    if (!selComp) return <div style={{color:C.muted,padding:40,textAlign:"center",fontSize:14}}>Sélectionne une compétition.</div>;
    const ath = selComp.athletes.find(a=>a.id===selAthleteId);
    const grp = selComp.groups.find(g=>g.id===selGroupId);
    const showGroup = grp && !ath;
    return (
      <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
        {isMobile&&(ath||showGroup)&&(
          <div style={{display:"flex",alignItems:"center",gap:8,padding:"10px 12px",borderBottom:`1px solid ${C.border}`,flexShrink:0,
            position:"sticky",top:0,background:C.headerBg,zIndex:5,backdropFilter:"blur(12px)"}}>
            <button onClick={()=>{setSelAthleteId(null);setSelGroupId(null);setMobileScreen("editor");}} style={{...btnSm,padding:"6px 10px"}}>←</button>
            <span style={{flex:1,fontSize:12,color:C.muted,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
              {showGroup ? `⚙️ ${grp.name}` : `${selComp?.name}`}
            </span>
          </div>
        )}
        {!isMobile&&(ath||showGroup)&&(
          <div style={{padding:"10px 16px 0",flexShrink:0,borderBottom:`1px solid ${C.border}`,paddingBottom:10,background:C.panelBg}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <button onClick={()=>{setSelAthleteId(null);setSelGroupId(null);}}
                style={{...btnSm,padding:"6px 12px",fontSize:12}}>← Vue d'ensemble</button>
              {selComp&&<CompNameEditor comp={selComp} onChange={c=>{markDirty();setComps(prev=>prev.map(x=>x.id===c.id?c:x));}}/>}
            </div>
          </div>
        )}
        <div className="scrollable" style={{flex:1}}>
          <div style={{padding:"18px 16px",paddingBottom:30}}>
            {showGroup
              ? <GroupEditor group={grp} comp={selComp} onUpdate={updGroup}
                  onRemove={()=>rmGroup(grp.id)} canRemove={selComp.groups.length>1}/>
              : !ath
                ? <CompOverview
                    comp={selComp}
                    onUpdComp={updComp}
                    onAddAthlete={addAthlete}
                    onAddGroup={addGroup}
                    onAddAthleteToGroup={addAthleteToGroup}
                    onLaunch={()=>{setLaunchMode(true);initAudio();setDelay(0);setDelayInp("0");if(isMobile)setMobileScreen("launch");}}
                    onSelectAthlete={id=>{setSelAthleteId(id);setSelGroupId(null);if(isMobile)setMobileScreen("editor");}}
                    onMarkDirty={markDirty}
                    isMobile={isMobile}
                    onUpdGroup={g=>{if(g._remove){rmGroup(g.id);return;}updGroup(g);}}
                    onRecalcTiming={recalculateTiming}
                  />
                : <AthleteEditor athlete={ath} comp={selComp} onUpdate={updAthlete} onRemove={()=>rmAthlete(ath.id)} canRemove={selComp.athletes.length>1}/>
            }
          </div>
        </div>
      </div>
    );
  };

  // ─ Panel lancement
  const LaunchPanel = ()=>{
    const launchGroups = getLaunchGroups();
    return (
      <div className="scrollable" style={{flex:1}}>
        <div style={{maxWidth:700,margin:"0 auto",padding:"14px 14px 30px",display:"flex",flexDirection:"column",gap:14}}>
          <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
            <button onClick={()=>{setLaunchMode(false);if(isMobile)setMobileScreen("athletes");setDelay(0);setDelayInp("0");if(selComp&&(selComp.liveDelay||0)!==0){markDirty();setComps(prev=>prev.map(c=>c.id===selCompId?{...c,liveDelay:0}:c));}}} style={{...btnSm,padding:"7px 12px"}}>← Édition</button>
            {selComp&&<span style={{fontWeight:700,fontSize:16,color:C.text,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{selComp.name}</span>}
            {days!==null&&<span style={{fontSize:11,fontWeight:700,padding:"3px 10px",borderRadius:4,flexShrink:0,
              background:days===0?C.redDim:C.goldDim,color:days===0?C.red:C.gold,
              border:`1px solid ${days===0?C.redBorder:C.goldBorder}`}}>
              {days===0?"AUJOURD'HUI":days>0?`J-${days}`:`J+${Math.abs(days)}`}
            </span>}

          </div>

          {/* ── Retard + Horaires — section déroulante compacte */}
          <div style={{borderRadius:11,border:`1px solid ${delay>0?C.redBorder:C.border}`,overflow:"hidden",background:delay>0?C.redDim:C.surface}}>

                ⏱ Retard {delay>0&&<span style={{fontFamily:"'DM Mono',monospace",color:C.red}}>+{delay}min</span>}
              </span>
              {delay===0&&<span style={{fontSize:11,color:C.muted}}>/ Horaires</span>}
              <div style={{flex:1}}/>
              {/* Boutons rapides toujours visibles */}
              {[5,10,15,20,30].map(n=>(
                <button key={n} onClick={e=>{e.stopPropagation();const nd=delay+n;setDelay(nd);setDelayInp(String(nd));setShowDelay(true);}}
                  style={{...btnSm,fontFamily:"'DM Mono',monospace",padding:"4px 8px",fontSize:12}}>+{n}</button>
              ))}
              {delay>0&&<button onClick={e=>{e.stopPropagation();setDelay(0);setDelayInp("0");}}
                style={{background:"transparent",border:"none",color:C.red,fontSize:13,padding:"2px 6px",cursor:"pointer",fontWeight:700,flexShrink:0}}>✕</button>}
              <span style={{fontSize:12,color:C.muted,flexShrink:0}}>{showDelay?"▲":"▼"}</span>
            </div>

            {/* Contenu déroulant */}
            {showDelay&&(
              <div style={{borderTop:`1px solid ${C.border}`,padding:"12px 14px",display:"flex",flexDirection:"column",gap:12}}>
                {/* Retard manuel */}
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontSize:11,color:C.muted}}>Retard manuel :</span>
                  <input type="number" value={delayInp} min={0}
                    onChange={e=>setDelayInp(e.target.value)}
                    onBlur={()=>{const v=parseInt(delayInp)||0;setDelay(v);setDelayInp(String(v));}}
                    style={{...inp,width:64,padding:"6px 8px",fontSize:14,textAlign:"center"}}/>
                  <span style={{fontSize:11,color:C.muted}}>min</span>
                  {delay>0&&<span style={{fontFamily:"'DM Mono',monospace",fontSize:15,fontWeight:700,color:C.red}}>+{delay}min</span>}
                </div>

                  <div>
                    <div style={{fontSize:9,color:C.muted,textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:8}}>

                    {/* Header colonnes */}
                    <div style={{display:"grid",gridTemplateColumns:"80px 1fr 1fr 1fr",gap:6,alignItems:"center",marginBottom:4}}>

                        const mc=movColor(C,mk);
                        return <div key={mk} style={{fontSize:9,fontWeight:700,color:mc,textAlign:"center",letterSpacing:"0.08em"}}>
                          {mk==="squat"?"SQUAT":mk==="bench"?"BENCH":"DEADLIFT"}
                        </div>;

                    </div>
                    {/* Ligne début compét */}

                    {/* Lignes par groupe */}
                    {[...(selComp.groups||[])].sort((a,b)=>(a.offset??0)-(b.offset??0)).map(group=>(

                        <div style={{fontSize:10,fontWeight:600,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{group.name}</div>
                        {MOV_ORDER.map(mk=>{
                          const mc=movColor(C,mk);
                          // Temps stocké (sans retard) — base du calcul delta
                          const baseMin=timeToMinutes(getMovStartTime(selComp,group.id,mk));
                          // Temps affiché = stocké + retard
                          const displayTime=minutesToTime(baseMin+delay);
                          return (
                            <input key={mk} type="time" value={displayTime}
                              onChange={e=>{
                                markDirty();
                                const newDisplayMin=timeToMinutes(e.target.value);
                                // Le delta s'applique sur les temps stockés (le retard est constant)
                                const delta=newDisplayMin-(baseMin+delay);
                                if(delta===0) return;
                                // On modifie UNIQUEMENT ce groupe + ce mouvement
                                const gmo={...(selComp.groupMovOffsets||{})};
                                gmo[group.id]={...(gmo[group.id]||{}),[mk]:((gmo[group.id]?.[mk])??0)+delta};
                                updComp({...selComp,groupMovOffsets:gmo});
                              }}
                              style={{...inp,padding:"6px 8px",fontSize:13,textAlign:"center",borderColor:`${mc}30`}}/>
                          );
                        })}
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}
          </div>

          {launchGroups.map(({group,athletes})=>(
            <div key={group.id}>
              {selComp.groups.length>1&&(
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8,padding:"0 2px"}}>
                  <div style={{fontSize:11,fontWeight:700,color:C.text,letterSpacing:"0.05em"}}>{group.name}</div>
                  {group.offset!==0&&<span style={{fontSize:10,color:C.gold,fontFamily:"'DM Mono',monospace"}}>{group.offset>0?"+":""}{group.offset}min</span>}
                  {/* Nombre d'athlètes rapide */}
                  <div style={{display:"flex",alignItems:"center",gap:4,marginLeft:4}}>
                    <span style={{fontSize:10,color:C.muted}}>👥</span>
                    <input type="number" value={group.athleteCount||10} min={1} max={99}
                      onChange={e=>{
                        markDirty();
                        const updated={...selComp,groups:selComp.groups.map(g=>g.id===group.id?{...g,athleteCount:Math.max(1,+e.target.value||10)}:g)};
                        updComp(updated);
                      }}
                      title="Nombre d'athlètes prévu"
                      style={{...inp,width:44,padding:"2px 5px",fontSize:12,textAlign:"center"}}/>
                    <button onClick={()=>{recalculateTiming();}}
                      style={{fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:5,
                        background:C.blueDim,border:`1px solid ${C.blueBorder}`,color:C.blue}}>
                      ⟳
                    </button>
                  </div>
                  <div style={{flex:1,height:1,background:C.border}}/>
                </div>
              )}
              {athletes.map(a=>{
                const mk=a.currentMovement||"squat";
                const maxPos=Math.max(...(selComp.athletes.filter(x=>(x.currentMovement||"squat")===mk).map(x=>(x.movements[mk]?.position||1))),0);
                return (
                  <div key={a.id} style={{marginBottom:10}}>
                    <LaunchCard athlete={a} comp={selComp} onUpdate={updAthlete}
                      onPosUp={()=>movPos(a.id,"up")} onPosDown={()=>movPos(a.id,"down")}
                      canUp={(a.movements[mk]?.position||1)>1} canDown={(a.movements[mk]?.position||1)<maxPos+1}
                      delay={delay} notifGranted={notifGranted}/>
                  </div>
                );
              })}
            </div>
          ))}
          {!launchGroups.length&&<div style={{textAlign:"center",color:C.muted,fontSize:13,padding:"40px 0"}}>Aucun athlète configuré.</div>}
        </div>
      </div>
    );
  };

  return (
    <ThemeCtx.Provider value={themeValue}>
      <div style={{height:"100dvh",background:C.bg,color:C.text,display:"flex",flexDirection:"column",overflow:"hidden"}}
        className={darkMode?"":"light-mode"}>
        {showSettings&&<SettingsModal config={config} onClose={()=>setShowSettings(false)}
          onReset={()=>{localStorage.removeItem("defcon_cfg");setConfig(null);setShowSettings(false);}}/>}
        {showTutorial&&<TutorialModal onClose={()=>{localStorage.setItem("defcon_tutorial_seen","1");setShowTutorial(false);}}/>}

        <header style={{height:HEADER_H,display:"flex",alignItems:"center",justifyContent:"space-between",
          padding:"0 14px",borderBottom:`1px solid ${C.border}`,
          background:C.headerBg,backdropFilter:"blur(12px)",flexShrink:0,zIndex:20,gap:10}}>
          <div style={{display:"flex",alignItems:"center",gap:8,minWidth:0}}>
            <img src={window.__DEFCON_LOGO__} alt="DEFCON ONE" style={{height:30,width:"auto",objectFit:"contain",flexShrink:0}}/>
            {launchMode&&<span style={{fontSize:9,background:C.redDim,color:C.red,padding:"2px 6px",borderRadius:3,letterSpacing:"0.1em",fontWeight:700,flexShrink:0}}>LIVE</span>}
          </div>
          <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
            {!config.offline&&syncErr&&(
              <div style={{position:"fixed",top:0,left:0,right:0,zIndex:9999,background:"#c0392b",color:"#fff",fontSize:12,fontWeight:700,padding:"8px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
                <span>🔴 Firebase inaccessible — modifications non sauvegardées. Vérifie les règles dans Firebase Console → Realtime Database → Règles.</span>
                <button onClick={()=>{markDirty();setSyncErr(false);setRetryTick(t=>t+1);}} style={{background:"rgba(255,255,255,0.2)",border:"1px solid rgba(255,255,255,0.4)",borderRadius:5,color:"#fff",fontSize:11,fontWeight:700,padding:"3px 8px",cursor:"pointer",flexShrink:0}}>Réessayer</button>
              </div>
            )}
            {!config.offline&&<div style={{width:6,height:6,borderRadius:"50%",flexShrink:0,background:syncErr?C.red:syncing?C.gold:C.green}}/>}
            <button onClick={toggleTheme}
              style={{background:C.surface2,border:`1px solid ${C.border}`,borderRadius:6,
                color:C.muted,fontSize:14,padding:"5px 8px",lineHeight:1,flexShrink:0}}
              title={darkMode?"Passer en mode clair":"Passer en mode sombre"}>
              {darkMode?"☀️":"🌙"}
            </button>
            <button onClick={reqNotifs}
              style={{background:notifGranted?C.greenDim:C.goldDim,border:`1px solid ${notifGranted?C.greenBorder:C.goldBorder}`,
                borderRadius:6,color:notifGranted?C.green:C.gold,fontSize:11,padding:"5px 9px",fontWeight:600,letterSpacing:"0.04em",flexShrink:0}}>
              {notifGranted?"🔔":"🔕"}
            </button>
            <button onClick={()=>setShowSettings(true)}
              style={{background:C.surface2,border:`1px solid ${C.border}`,borderRadius:6,color:C.muted,fontSize:14,padding:"5px 8px",lineHeight:1,flexShrink:0}}>⚙️</button>
            <button onClick={()=>setShowTutorial(true)} title="Tutoriel"
              style={{background:C.goldDim,border:`1px solid ${C.goldBorder}`,borderRadius:6,color:C.gold,fontSize:11,padding:"5px 9px",fontWeight:800,letterSpacing:"0.04em",flexShrink:0}}>
              ?
            </button>
          </div>
        </header>

        <div style={{flex:1,display:"flex",overflow:"hidden",position:"relative"}}>
          {!isMobile&&(
            <>
              {!launchMode&&(
                <>
                  <aside style={{width:195,borderRight:`1px solid ${C.border}`,display:"flex",flexDirection:"column",background:C.bodyBg,flexShrink:0,overflow:"hidden"}}>
                    {CompListPanel()}
                  </aside>
                  <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>
                    {EditorPanel()}
                  </div>
                  <aside style={{width:320,borderLeft:`1px solid ${C.border}`,display:"flex",flexDirection:"column",background:C.bodyBg,flexShrink:0,overflow:"hidden"}}>
                    <TeamScreen teamRoster={teamRoster}
                      onAdd={a=>{markDirty();setTeamRoster(prev=>[...prev,a]);}}
                      onDelete={id=>{markDirty();setTeamRoster(prev=>prev.filter(x=>x.id!==id));}}
                      onRefresh={(id,data)=>{markDirty();setTeamRoster(prev=>prev.map(x=>x.id===id?{...x,...data}:x));}}/>
                  </aside>
                </>
              )}
              {launchMode&&LaunchPanel()}
            </>
          )}

          {isMobile&&(
            <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column",paddingBottom:BOTTOM_H}}>
              {mobileScreen==="comps"&&!launchMode&&(
                <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>{CompListPanel()}</div>
              )}
              {mobileScreen==="team"&&!launchMode&&(
                <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>
                  <TeamScreen teamRoster={teamRoster}
                    onAdd={a=>{markDirty();setTeamRoster(prev=>[...prev,a]);}}
                    onDelete={id=>{markDirty();setTeamRoster(prev=>prev.filter(x=>x.id!==id));}}
                    onRefresh={(id,data)=>{markDirty();setTeamRoster(prev=>prev.map(x=>x.id===id?{...x,...data}:x));}}/>
                </div>
              )}
              {mobileScreen==="editor"&&!launchMode&&(
                <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>{EditorPanel()}</div>
              )}
              {(mobileScreen==="launch"||launchMode)&&LaunchPanel()}
            </div>
          )}
        </div>

        {isMobile&&!launchMode&&(
          <div style={{position:"fixed",bottom:0,left:0,right:0,height:BOTTOM_H,
            background:C.navBg,borderTop:`1px solid ${C.border}`,
            display:"flex",backdropFilter:"blur(12px)",zIndex:30}}>
            {[
              {id:"comps",icon:"🏆",label:"Compéts"},
              {id:"team",icon:"🏋️",label:"Équipe"},
              {id:"editor",icon:"✏️",label:"Éditer"},
            ].map(tab=>(
              <button key={tab.id} onClick={()=>setMobileScreen(tab.id)}
                style={{flex:1,background:"transparent",border:"none",display:"flex",
                  flexDirection:"column",alignItems:"center",justifyContent:"center",gap:3,
                  color:mobileScreen===tab.id?C.gold:C.muted,padding:"6px 0"}}>
                <span style={{fontSize:18}}>{tab.icon}</span>
                <span style={{fontSize:10,fontWeight:600,letterSpacing:"0.04em"}}>{tab.label}</span>
              </button>
            ))}
          </div>
        )}
      </div>
    </ThemeCtx.Provider>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<ErrorBoundary><App/></ErrorBoundary>);
</script>
</body>
</html>
