// ─── Utils ────────────────────────────────────────────────────────────────────
function uid() { return Math.random().toString(36).slice(2,9); }
function timeToMinutes(hhmm) {
  if (!hhmm) return 0;
  const [h,m] = hhmm.split(":").map(Number);
  return h*60+(m||0);
}
function minutesToTime(mins) {
  const v = (((mins%1440)+1440)%1440);
  const ts = Math.round(v*60);
  return `${String(Math.floor(ts/3600)).padStart(2,"0")}:${String(Math.floor((ts%3600)/60)).padStart(2,"0")}`;
}
function nowSeconds() {
  const n = new Date();
  return n.getHours()*3600+n.getMinutes()*60+n.getSeconds();
}
function formatDate(iso) {
  if (!iso) return "";
  return new Date(iso+"T12:00:00").toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"});
}
function daysUntil(iso) {
  if (!iso) return null;
  const t=new Date(); t.setHours(0,0,0,0);
  const c=new Date(iso+"T00:00:00"); c.setHours(0,0,0,0);
  return Math.round((c-t)/86400000);
}

// ─── Migration ────────────────────────────────────────────────────────────────
function migrateAthleteMovement(m, fallbackGroupMov) {
  const def = defaultMovement();
  if (!m) return def;
  const fb = fallbackGroupMov || {};
  const warmupSets =
    (m.warmupSets && m.warmupSets.length > 0) ? m.warmupSets.map(s=>({...s,id:s.id||uid()})) :
    (fb.warmupSets && fb.warmupSets.length > 0) ? fb.warmupSets.map(s=>({...s,id:s.id||uid()})) :
    def.warmupSets;
  return {
    position: m.position ?? 1,
    openerWeight: m.openerWeight ?? "",
    gamePlan: m.gamePlan || def.gamePlan,
    doneSets: m.doneSets || {},
    restBetween: m.restBetween ?? fb.restBetween ?? def.restBetween,
    setDuration: m.setDuration ?? fb.setDuration ?? def.setDuration,
    bufferBeforeOpener: m.bufferBeforeOpener ?? fb.bufferBeforeOpener ?? def.bufferBeforeOpener,
    generalWarmup: m.generalWarmup || fb.generalWarmup || def.generalWarmup,
    warmupSets,
  };
}

function migrateComp(c) {
  if (!c) return null;
  let out = { ...c };

  if (!out.groups || !out.groups.length) {
    const g = defaultGroup("Groupe 1");
    out.groups = [g];
    out.athletes = (out.athletes||[]).map(a => ({ ...a, groupId:g.id }));
  }
  if (!out.compStartTime) {
    out.compStartTime = out.athletes?.[0]?.movements?.squat?.compStartTime || "10:00";
  }
  if (!out.movementOffsets) {
    const sq = timeToMinutes(out.athletes?.[0]?.movements?.squat?.compStartTime || out.compStartTime || "10:00");
    const bp = timeToMinutes(out.athletes?.[0]?.movements?.bench?.compStartTime || "13:00");
    const dl = timeToMinutes(out.athletes?.[0]?.movements?.deadlift?.compStartTime || "16:00");
    out.movementOffsets = { squat:0, bench:bp-sq, deadlift:dl-sq };
  }

  const fgId = out.groups[0]?.id;

  const normalizedGroups = out.groups.map(g => ({
    id: g.id,
    name: g.name || "Groupe",
    offset: g.offset ?? 0,
    athleteCount: g.athleteCount ?? 10,
    _legacyMov: g.movements,
  }));

  out.athletes = (out.athletes||[]).map(a => {
    const gId = a.groupId && normalizedGroups.find(g=>g.id===a.groupId) ? a.groupId : fgId;
    const grp = normalizedGroups.find(g=>g.id===gId);
    const lm = grp?._legacyMov;
    return {
      ...a,
      groupId: gId,
      movements: {
        squat:    migrateAthleteMovement(a.movements?.squat,    lm?.squat),
        bench:    migrateAthleteMovement(a.movements?.bench,    lm?.bench),
        deadlift: migrateAthleteMovement(a.movements?.deadlift, lm?.deadlift),
      }
    };
  });

  out.groups = normalizedGroups.map(({ _legacyMov, ...g }) => g);

  return out;
}

// ─── Planning ─────────────────────────────────────────────────────────────────
function getMovStartTime(comp, groupId, movKey) {
  const offsets = comp.movementOffsets || { squat:0, bench:180, deadlift:360 };
  const movOffset = offsets[movKey] ?? 0;
  const group = (comp.groups||[]).find(g=>g.id===groupId);
  const groupOffset = group?.offset ?? 0;
  const extraOffset = comp.groupMovOffsets?.[groupId]?.[movKey] ?? 0;
  return minutesToTime(timeToMinutes(comp.compStartTime||"10:00") + movOffset + groupOffset + extraOffset);
}

function computeSchedule(movConfig, compStartTime, position, delay=0) {
  if (!compStartTime || !movConfig) return [];
  const { restBetween=6, setDuration=1.5, bufferBeforeOpener=8,
          warmupSets=[], generalWarmup } = movConfig;
  const pos = position ?? 1;
  const n = warmupSets.length;
  const liftMin = timeToMinutes(compStartTime) + (pos-1) + delay;
  const sets = [];
  if (n > 0) {
    const lastStart = liftMin - bufferBeforeOpener - setDuration;
    warmupSets.forEach((set,i) => {
      const offset = (n-1-i) * (restBetween+setDuration);
      sets.push({ ...set, index:i, startMin:lastStart-offset, startTime:minutesToTime(lastStart-offset), type:"warmup" });
    });
  }
  if (generalWarmup?.enabled !== false) {
    const dur = generalWarmup?.duration ?? 20;
    const anchor = sets.length > 0 ? sets[0].startMin : (liftMin - bufferBeforeOpener - setDuration);
    sets.unshift({ id:"general", type:"general", index:-1, startMin:anchor-dur, startTime:minutesToTime(anchor-dur), duration:dur });
  }
  return sets;
}

function setKey(sc) { return sc.type==="general" ? "general" : String(sc.index); }

// ─── Calcul timeline compétition ────────────────────────────────────────────
// Pour N groupes G1..Gn avec athleteCount chacun :
// - G_i squat : base + sum(prev groups durations)
// - Durée groupe i pour un mouvement : 3 essais × athleteCount × 1min
// - Bench démarre : total_squat_time + pause
// - Deadlift : bench_offset + total_bench_time + pause
function computeFullTimeline(comp, breakBetween=10) {
  const groups = [...(comp.groups||[])].sort((a,b)=>(a.offset??0)-(b.offset??0));
  const startMin = timeToMinutes(comp.compStartTime||"10:00");
  const attemptsPerMov = 3;
  const minPerAthAttempt = 1;

  let cumOffset = 0;
  const groupOffsets = {};
  groups.forEach(g => {
    groupOffsets[g.id] = cumOffset;
    cumOffset += attemptsPerMov * (g.athleteCount||10) * minPerAthAttempt;
  });
  const totalMovDur = cumOffset; // durée totale d'un mouvement pour tous les groupes

  const movOffsets = {
    squat: 0,
    bench: totalMovDur + breakBetween,
    deadlift: 2*(totalMovDur + breakBetween),
  };

  const timeline = {};
  groups.forEach(g => {
    timeline[g.id] = {};
    MOV_ORDER.forEach(mk => {
      timeline[g.id][mk] = minutesToTime(startMin + movOffsets[mk] + groupOffsets[g.id]);
    });
  });

  return { timeline, movOffsets, groupOffsets, totalMovDur };
}


// ─── OpenIPF ──────────────────────────────────────────────────────────────────
function parseLifterCSV(csvText, username) {
  const lines = csvText.trim().split('\n');
  if (lines.length < 2) throw new Error('Données vides');
  const headers = lines[0].split(',').map(h => h.trim().replace(/"/g, ''));
  const rows = lines.slice(1).map(line => {
    const values = []; let cur = ''; let inQ = false;
    for (const ch of line) {
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { values.push(cur.trim()); cur = ''; }
      else { cur += ch; }
    }
    values.push(cur.trim());
    const row = {}; headers.forEach((h,i) => { row[h] = values[i] || ''; }); return row;
  });
  const competitions = rows
    .filter(r => r.Event === 'SBD' && r.Equipment === 'Raw')
    .map(r => ({
      date: r.Date||'—', meet: r.MeetName||'—',
      location: [r.MeetTown, r.MeetCountry].filter(Boolean).join(', ')||'—',
      bodyweight: parseFloat(r.BodyweightKg)||null,
      weightClass: r.WeightClassKg||'—',
      squat:    parseFloat(r.Best3SquatKg)>0    ? parseFloat(r.Best3SquatKg)    : null,
      bench:    parseFloat(r.Best3BenchKg)>0    ? parseFloat(r.Best3BenchKg)    : null,
      deadlift: parseFloat(r.Best3DeadliftKg)>0 ? parseFloat(r.Best3DeadliftKg) : null,
      total:    parseFloat(r.TotalKg)>0          ? parseFloat(r.TotalKg)          : null,
      place: (r.Place && !isNaN(r.Place)) ? parseInt(r.Place) : null,
      federation: r.Federation||'—',
      dots: parseFloat(r.Dots)||null,
    }))
    .sort((a,b) => b.date.localeCompare(a.date));
  const best = {
    squat:    Math.max(0,...competitions.map(c=>c.squat||0))||null,
    bench:    Math.max(0,...competitions.map(c=>c.bench||0))||null,
    deadlift: Math.max(0,...competitions.map(c=>c.deadlift||0))||null,
    total:    Math.max(0,...competitions.map(c=>c.total||0))||null,
  };
  const latest = rows.find(r => r.Event==='SBD' && r.Equipment==='Raw') || rows[0] || {};
  const name = latest.Name ? latest.Name.replace(/ #\d+$/, '') : username;
  return { name, username,
    category: latest.WeightClassKg ? `-${latest.WeightClassKg}kg` : '—',
    federation: 'IPF',
    openipfUrl: `https://www.openipf.org/u/${username}`,
    bestLifts: best, competitions, loadedAt: Date.now(),
  };
}
async function fetchLifterData(username) {
  let resp;
  try { resp = await fetch(`/api/lifter?username=${encodeURIComponent(username)}`); }
  catch(e) { throw new Error('Connexion impossible — vérifie ta connexion internet.'); }
  if (!resp.ok) throw new Error(resp.status===404 ? 'Athlète introuvable sur OpenIPF.' : `Erreur réseau (${resp.status})`);
  const data = await resp.json();
  if (data.error) throw new Error(data.error);
  return { ...data, loadedAt: Date.now() };
}
function extractOpenIPFUsername(raw) {
  raw = raw.trim();
  const m = raw.match(/\/u\/([a-z0-9_.-]+)/i);
  if (m) return m[1].toLowerCase();
  if (/^[a-z0-9_.-]+$/i.test(raw)) return raw.toLowerCase();
  return null;
}

// ─── Audio ────────────────────────────────────────────────────────────────────
let _ctx=null;
function getCtx() {
  if (!_ctx) { try { _ctx = new (window.AudioContext||window.webkitAudioContext)(); } catch(e){} }
  if (_ctx?.state==="suspended") { try { _ctx.resume(); } catch(e){} }
  return _ctx;
}
function tone(freq,dur,vol,when) {
  const ctx=getCtx(); if(!ctx) return;
  try {
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.connect(g); g.connect(ctx.destination); o.frequency.value=freq; o.type="sine";
    const t=when??ctx.currentTime;
    g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(vol,t+0.02); g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.start(t); o.stop(t+dur);
  } catch(e){}
}
function playAlert() { const ctx=getCtx(); if(!ctx) return; const t=ctx.currentTime; tone(660,.18,.5,t); tone(880,.18,.6,t+.22); tone(1100,.18,.65,t+.44); tone(1320,.55,.75,t+.66); }
function playWarn()  { const ctx=getCtx(); if(!ctx) return; const t=ctx.currentTime; tone(440,.25,.3,t); tone(550,.3,.3,t+.35); }
function initAudio() { tone(440,.04,.03); }

// ─── Countdown ────────────────────────────────────────────────────────────────
function Countdown({ targetMin, sm }) {
  const { C } = useTheme();
  const [secs,setSecs] = useState(null);
  useEffect(() => {
    const upd = () => setSecs(Math.round(targetMin*60-nowSeconds()));
    upd(); const iv=setInterval(upd,500); return ()=>clearInterval(iv);
  },[targetMin]);
  if (secs===null) return null;
  const abs=Math.abs(secs), m=Math.floor(abs/60), s=abs%60;
  const txt=`${secs<0?"-":""}${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
  const isPast=secs<0, isNow=abs<90;
  return (
    <span style={{ fontFamily:"'DM Mono',monospace", fontSize:sm?11:13, fontWeight:700,
      padding:sm?"2px 6px":"3px 10px", borderRadius:5, whiteSpace:"nowrap",
      background:isPast?C.redDim:isNow?C.goldDim:C.surface2,
      color:isPast?C.red:isNow?C.gold:C.muted,
      border:`1px solid ${isPast?C.redBorder:isNow?C.goldBorder:C.border}` }}>
      {txt}
    </span>
  );
}

// ─── Hash simple (usage UX uniquement, non cryptographique) ───────────────────
function simpleHash(str) {
  let h = 5381;
  for (let i = 0; i < str.length; i++) { h = ((h << 5) + h) + str.charCodeAt(i); h = h & h; }
  return h.toString(36);
}

      if (!name.trim()) { setErr("Choisis un nom d'équipe."); return; }
      if (!pass.trim()) { setErr("Choisis un mot de passe."); return; }
      if (pass !== pass2) { setErr("Les mots de passe ne correspondent pas."); return; }
      setLoading(true); setErr(""); initAudio();
      const existing = await fbGet(FB_URL, name.trim());
      if (existing !== null) {
        setErr("Ce nom d'équipe est déjà utilisé. Choisis-en un autre."); setLoading(false); return;
      }
      const ok = await fbSet(FB_URL, name.trim(), { passwordHash: simpleHash(pass), competitions: [], version: 0 });
      if (!ok) { setErr("Connexion échouée. Vérifie ta connexion internet."); setLoading(false); return; }
      const cfg = { url: FB_URL, code: name.trim(), passwordHash: simpleHash(pass) };
      localStorage.setItem("defcon_cfg", JSON.stringify(cfg)); onSetup(cfg);
    }
    return (
      <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"28px 20px",gap:20}}>
        <Logo/>
        <div style={{width:"100%",maxWidth:400,background:C.surface,border:`1px solid ${C.border}`,borderRadius:14,padding:"20px 18px",display:"flex",flexDirection:"column",gap:14}}>
          <div style={{fontSize:16,fontWeight:800,color:C.text}}>Créer une équipe</div>
          <div>
            <div style={{fontSize:10,color:C.muted,marginBottom:6,textTransform:"uppercase",letterSpacing:"0.12em"}}>Nom de l'équipe</div>
            <input value={name} onChange={e=>setName(e.target.value)} style={inp} placeholder="ex: teamrouge" autoCapitalize="off" spellCheck={false}/>
            <div style={{fontSize:11,color:C.muted,marginTop:4}}>Ce nom sert aussi de code pour tes athlètes.</div>
          </div>
          <div>
            <div style={{fontSize:10,color:C.muted,marginBottom:6,textTransform:"uppercase",letterSpacing:"0.12em"}}>Mot de passe</div>
            <input type="password" value={pass} onChange={e=>setPass(e.target.value)} style={inp} placeholder="Mot de passe…"/>
          </div>
          <div>
            <div style={{fontSize:10,color:C.muted,marginBottom:6,textTransform:"uppercase",letterSpacing:"0.12em"}}>Confirmer le mot de passe</div>
            <input type="password" value={pass2} onChange={e=>setPass2(e.target.value)} style={inp} placeholder="Confirmer…" onKeyDown={e=>e.key==="Enter"&&createTeam()}/>
          </div>
          <ErrBox msg={err}/>
          <button onClick={createTeam} disabled={loading} style={{...btnGold,opacity:loading?0.6:1}}>{loading?"CRÉATION…":"CRÉER L'ÉQUIPE →"}</button>
        </div>
        <button onClick={()=>setStep(0)} style={btnGhost}>← Retour</button>
      </div>
    );
  }

  // ── Étape 2 : rejoindre une équipe ─────────────────────────────────────────
  async function joinTeam() {
    if (!name.trim()) { setErr("Saisis le nom de l'équipe."); return; }
    if (!pass.trim()) { setErr("Saisis le mot de passe."); return; }
    setLoading(true); setErr(""); initAudio();
    const data = await fbGet(FB_URL, name.trim());
    if (data === null) { setErr("Équipe introuvable. Vérifie le nom."); setLoading(false); return; }
    if (!data.passwordHash) {
      setErr("Cette équipe n'a pas de mot de passe — elle a été créée avec l'ancienne version. Demande à ton coach de la recréer."); setLoading(false); return;
    }
    if (data.passwordHash !== simpleHash(pass)) {
      setErr("Mot de passe incorrect."); setLoading(false); return;
    }
    const cfg = { url: FB_URL, code: name.trim(), passwordHash: data.passwordHash };
    localStorage.setItem("defcon_cfg", JSON.stringify(cfg)); onSetup(cfg);
  }

  return (
    <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"28px 20px",gap:20}}>
      <Logo/>
      <div style={{width:"100%",maxWidth:400,background:C.surface,border:`1px solid ${C.border}`,borderRadius:14,padding:"20px 18px",display:"flex",flexDirection:"column",gap:14}}>
        <div style={{fontSize:16,fontWeight:800,color:C.text}}>Rejoindre mon équipe</div>
        <div>
          <div style={{fontSize:10,color:C.muted,marginBottom:6,textTransform:"uppercase",letterSpacing:"0.12em"}}>Nom de l'équipe</div>
          <input value={name} onChange={e=>setName(e.target.value)} style={inp} placeholder="ex: teamrouge" autoCapitalize="off" spellCheck={false}/>
        </div>
        <div>
          <div style={{fontSize:10,color:C.muted,marginBottom:6,textTransform:"uppercase",letterSpacing:"0.12em"}}>Mot de passe</div>
          <input type="password" value={pass} onChange={e=>setPass(e.target.value)} style={inp} placeholder="Mot de passe…" onKeyDown={e=>e.key==="Enter"&&joinTeam()}/>
        </div>
        <ErrBox msg={err}/>
        <button onClick={joinTeam} disabled={loading} style={{...btnGold,opacity:loading?0.6:1}}>{loading?"CONNEXION…":"SE CONNECTER →"}</button>
      </div>
      <button onClick={()=>setStep(0)} style={btnGhost}>← Retour</button>
    </div>
  );
}

function AthleteDetailModal({ athlete, onClose, onRefresh, onDelete }) {

  const [loading, setLoading] = React.useState(false);
  const [err, setErr] = React.useState('');
  const a = athlete;
  const b = a.bestLifts || {};
  const comps = a.competitions || [];
  const maxSq = Math.max(0,...comps.map(c=>c.squat||0));
  const maxBn = Math.max(0,...comps.map(c=>c.bench||0));
  const maxDl = Math.max(0,...comps.map(c=>c.deadlift||0));
  const maxTo = Math.max(0,...comps.map(c=>c.total||0));

  async function doRefresh() {
    setLoading(true); setErr('');
    try { const data = await fetchLifterData(a.username); onRefresh(data); }
    catch(e) { setErr(e.message); }
    setLoading(false);
  }

  const placeColor = p => p===1?'#f5c518':p===2?'#c0c0c0':p===3?'#cd7f32':C.muted;

  return (
    <div style={{position:'fixed',inset:0,zIndex:900,background:C.overlay,display:'flex',flexDirection:'column'}}>
      <div style={{flex:1,background:C.bg,display:'flex',flexDirection:'column',overflow:'hidden',maxWidth:620,width:'100%',margin:'0 auto'}}>

          <div style={{flex:1,fontSize:15,fontWeight:800,color:C.text,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{a.name}</div>
          <div style={{display:'flex',gap:6}}>
            <button onClick={doRefresh} disabled={loading} style={{...btnGreen,opacity:loading?0.6:1}}>{loading?'…':'⟳'}</button>
            <button onClick={onDelete} style={btnDanger}>🗑</button>
          </div>
        </div>

        <div className="scrollable" style={{flex:1,overflowY:'auto',padding:'14px'}}>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14}}>
            {a.category&&<span style={{fontSize:12,fontWeight:700,padding:'3px 9px',borderRadius:20,background:C.goldDim,color:C.gold,border:`1px solid ${C.goldBorder}`}}>{a.category}</span>}
            {a.federation&&<span style={{fontSize:12,fontWeight:600,padding:'3px 9px',borderRadius:20,background:C.blueDim,color:C.blue,border:`1px solid ${C.blueBorder}`}}>{a.federation}</span>}
            {a.openipfUrl&&<a href={a.openipfUrl} target="_blank" rel="noreferrer"
              style={{marginLeft:'auto',fontSize:12,color:C.muted,textDecoration:'none',padding:'4px 10px',borderRadius:7,border:`1px solid ${C.border}`,background:C.surface}}>↗ OpenIPF</a>}
          </div>

          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:8,marginBottom:14}}>
            {[
              {label:'Squat',val:b.squat,color:C.squat},
              {label:'Bench',val:b.bench,color:C.bench},
              {label:'Soulevé',val:b.deadlift,color:C.deadlift},
              {label:'Total',val:b.total,color:C.text},
            ].map(s=>(
              <div key={s.label} style={{padding:'11px 8px',borderRadius:9,background:C.surface,border:`1px solid ${C.border}`,textAlign:'center'}}>
                <div style={{fontSize:9,color:C.muted,textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:5}}>{s.label}</div>
                <div style={{fontSize:20,fontWeight:800,color:s.color,fontFamily:"'DM Mono',monospace",lineHeight:1}}>{s.val||'—'}</div>
                {s.val&&<div style={{fontSize:9,color:C.muted,marginTop:2}}>kg</div>}
              </div>

            <div key={i} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:'12px',marginBottom:8}}>
              <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:8,marginBottom:8}}>

                  <div style={{fontSize:11,color:C.muted,marginTop:2}}>{comp.date}{comp.location&&comp.location!=='—'?` · ${comp.location}`:''}</div>

              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:6}}>
                {[
                  {label:'SQ',val:comp.squat,pr:comp.squat===maxSq&&maxSq>0,color:C.squat},
                  {label:'BP',val:comp.bench,pr:comp.bench===maxBn&&maxBn>0,color:C.bench},
                  {label:'DL',val:comp.deadlift,pr:comp.deadlift===maxDl&&maxDl>0,color:C.deadlift},
                  {label:'TOT',val:comp.total,pr:comp.total===maxTo&&maxTo>0,color:C.text},
                ].map(s=>(
                  <div key={s.label} style={{textAlign:'center',padding:'6px 4px',borderRadius:7,
                    background:s.pr?`${s.color}15`:C.surface2,border:`1px solid ${s.pr?s.color+'40':C.border}`}}>
                    <div style={{fontSize:9,color:C.muted,letterSpacing:'0.08em',marginBottom:3}}>{s.label}</div>
                    <div style={{fontSize:14,fontWeight:s.pr?800:600,color:s.pr?s.color:C.text,fontFamily:"'DM Mono',monospace"}}>{s.val||'—'}</div>
                    {s.pr&&s.val&&<div style={{fontSize:8,color:s.color,fontWeight:700,marginTop:1}}>PR</div>}
                  </div>
                ))}
              </div>
              {comp.dots&&<div style={{fontSize:10,color:C.muted,marginTop:6,textAlign:'right'}}>DOTS : <span style={{color:C.gold,fontFamily:"'DM Mono',monospace",fontWeight:700}}>{comp.dots.toFixed(2)}</span></div>}
            </div>
          ))}

          {a.loadedAt&&<div style={{textAlign:'center',fontSize:10,color:C.muted,padding:'8px 0',marginTop:4}}>
            Données chargées le {new Date(a.loadedAt).toLocaleDateString('fr-FR')} · Source : openipf.org
          </div>}
        </div>
      </div>
    </div>
  );
}

function TutorialModal({ onClose }) {
  const { C, btnGold } = useTheme();
  const [step, setStep] = useState(0);
  const s = TUTORIAL_STEPS[step];
  const isLast = step === TUTORIAL_STEPS.length - 1;

  return (
    <div style={{position:"fixed",inset:0,zIndex:1000,background:C.overlay,display:"flex",alignItems:"flex-end",justifyContent:"center"}}
      onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{width:"100%",maxWidth:520,background:C.bg2,borderRadius:"20px 20px 0 0",
        border:`1px solid ${C.border2}`,borderBottom:"none",display:"flex",flexDirection:"column",
        maxHeight:"90dvh",overflow:"hidden"}}>
        {/* Header barre colorée */}
        <div style={{height:4,background:`linear-gradient(90deg, ${s.color}88, ${s.color})`,borderRadius:"20px 20px 0 0",flexShrink:0}}/>

        {/* Title bar */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",
          padding:"14px 18px 10px",flexShrink:0,borderBottom:`1px solid ${C.border}`}}>
          <div>
            <div style={{fontSize:10,color:C.muted,letterSpacing:"0.12em",textTransform:"uppercase",fontWeight:600}}>
              TUTORIEL — ÉTAPE {step+1}/{TUTORIAL_STEPS.length}
            </div>
            <div style={{fontSize:15,fontWeight:800,color:C.text,marginTop:2}}>{s.subtitle}</div>
          </div>
          <button onClick={onClose}
            style={{background:C.surface2,border:`1px solid ${C.border}`,borderRadius:8,color:C.muted,
              fontSize:18,lineHeight:1,padding:"4px 9px",fontWeight:300}}>✕</button>
        </div>

        {/* Dots progress */}
        <div style={{display:"flex",gap:5,padding:"10px 18px 0",flexShrink:0}}>
          {TUTORIAL_STEPS.map((_,i)=>(
            <div key={i} onClick={()=>setStep(i)} style={{cursor:"pointer",
              height:3,flex:1,borderRadius:2,
              background:i<=step?s.color:C.border,
              opacity:i===step?1:i<step?0.5:0.25,transition:"all 0.2s"}}/>
          ))}
        </div>

        {/* Content */}
        <div className="scrollable" style={{flex:1,padding:"16px 18px 10px",overflowY:"auto"}}>
          {/* Icon + title */}
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
            <div style={{width:48,height:48,borderRadius:14,
              background:`${s.color}18`,border:`1px solid ${s.color}44`,
              display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,flexShrink:0}}>
              {s.icon}
            </div>
            <div style={{fontSize:17,fontWeight:800,color:C.text,lineHeight:1.3}}>{s.title}</div>
          </div>

          {/* Content blocks */}
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {s.content.map((block, bi) => {
              if (block.type === "text") return (
                <div key={bi} style={{fontSize:13,color:C.muted,lineHeight:1.65}}>{block.text}</div>
              );
              if (block.type === "highlight") return (
                <div key={bi} style={{background:`${block.color}12`,border:`1px solid ${block.color}33`,
                  borderRadius:10,padding:"12px 14px",fontSize:13,color:C.text,lineHeight:1.6,fontWeight:500}}>
                  {block.text}
                </div>
              );
              if (block.type === "step") return (
                <div key={bi} style={{display:"flex",gap:10,alignItems:"flex-start"}}>
                  <div style={{width:22,height:22,borderRadius:"50%",background:`${s.color}22`,
                    border:`1px solid ${s.color}55`,display:"flex",alignItems:"center",justifyContent:"center",
                    fontSize:11,fontWeight:800,color:s.color,flexShrink:0,marginTop:1}}>{block.num}</div>
                  <div style={{fontSize:13,color:C.text,lineHeight:1.6,flex:1}}>{block.text}</div>
                </div>
              );
              if (block.type === "mandatory") return (
                <div key={bi} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:"11px 13px"}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                    <span style={{fontSize:16}}>{block.icon}</span>
                    <span style={{fontSize:13,fontWeight:700,color:"#e05252"}}>{block.label}</span>
                  </div>
                  <div style={{fontSize:12,color:C.muted,lineHeight:1.55,paddingLeft:26}}>{block.desc}</div>
                </div>
              );
              if (block.type === "optional") return (
                <div key={bi} style={{display:"flex",alignItems:"center",gap:10,
                  background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:"9px 12px"}}>
                  <span style={{fontSize:15}}>{block.icon}</span>
                  <span style={{flex:1,fontSize:13,color:C.muted}}>{block.label}</span>
                  <span style={{fontSize:12,fontFamily:"'DM Mono',monospace",
                    color:"#4caf83",background:"rgba(76,175,131,0.1)",
                    border:"1px solid rgba(76,175,131,0.25)",borderRadius:5,padding:"2px 8px"}}>{block.def}</span>
                </div>
              );
              if (block.type === "example") return (
                <div key={bi} style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:10,padding:"12px 14px"}}>
                  <div style={{fontSize:10,fontWeight:700,color:s.color,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:8}}>{block.title}</div>
                  {block.lines.map((line,li)=>(
                    <div key={li} style={{fontFamily:"'DM Mono',monospace",fontSize:12,
                      color:line.startsWith("  ")?C.muted:C.text,lineHeight:1.7}}>
                      {line || "\u00A0"}
                    </div>
                  ))}
                </div>
              );
              return null;
            })}
          </div>
        </div>

        {/* Footer buttons */}
        <div style={{padding:"12px 18px 20px",display:"flex",gap:10,flexShrink:0,borderTop:`1px solid ${C.border}`}}>
          {step > 0 && (
            <button onClick={()=>setStep(s=>s-1)}
              style={{flex:1,background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,
                color:C.muted,fontSize:14,fontWeight:700,padding:"12px"}}>
              ← Précédent
            </button>
          )}
          {!isLast ? (
            <button onClick={()=>setStep(s=>s+1)}
              style={{flex:1,background:`${s.color}20`,border:`1px solid ${s.color}44`,borderRadius:10,
                color:s.color,fontSize:14,fontWeight:700,padding:"12px",letterSpacing:"0.03em"}}>
              Suivant →
            </button>
          ) : (
            <button onClick={onClose}
              style={{flex:1,background:C.goldDim,border:`1px solid ${C.goldBorder}`,borderRadius:10,
                color:C.gold,fontSize:14,fontWeight:700,padding:"12px",letterSpacing:"0.04em"}}>
              C'est parti ! 🚀
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── WarmupConfigEditor ───────────────────────────────────────────────────────
function WarmupConfigEditor({ athMov, movKey, compStartTime, onUpdate }) {
  const { C, inp, btnDanger, btnGhost } = useTheme();
  const mc = movColor(C, movKey);
  const schedule = computeSchedule(athMov, compStartTime, athMov.position||1, 0);
  const upd = (k,v) => onUpdate({...athMov,[k]:v});
  const updSet = (i,v) => onUpdate({...athMov,warmupSets:(athMov.warmupSets||[]).map((s,ii)=>ii===i?{...s,weight:v}:s)});
  const rmSet = i => onUpdate({...athMov,warmupSets:(athMov.warmupSets||[]).filter((_,ii)=>ii!==i)});
  const addSet = () => onUpdate({...athMov,warmupSets:[...(athMov.warmupSets||[]),{id:uid(),weight:0}]});
  const gw = athMov.generalWarmup || { enabled:true, duration:20 };
  const ws = athMov.warmupSets || [];

  return (
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        {[
          {label:"Repos entre séries (min)",key:"restBetween",min:1,max:30,step:1},
          {label:"Durée série (min)",key:"setDuration",min:0.5,max:10,step:0.5},
          {label:"Buffer avant opener (min)",key:"bufferBeforeOpener",min:1,max:30,step:1},
        ].map(({label,key,min,max,step})=>(
          <div key={key}>
            <div style={{fontSize:10,color:C.muted,marginBottom:5,textTransform:"uppercase",letterSpacing:"0.09em"}}>{label}</div>
            <input type="number" value={athMov[key]??6} min={min} max={max} step={step}
              onChange={e=>upd(key,step===0.5?parseFloat(e.target.value)||0:+e.target.value)}
              style={{...inp,fontSize:14,padding:"10px"}} />
          </div>
        ))}
      </div>

      <div style={{padding:"12px",background:gw.enabled?C.blueDim:C.surface,border:`1px solid ${gw.enabled?C.blueBorder:C.border}`,borderRadius:9}}>
        <div style={{display:"flex",alignItems:"center",gap:10,justifyContent:"space-between"}}>
          <div>
            <div style={{fontSize:13,fontWeight:600,color:gw.enabled?C.blue:C.muted}}>⏱ Échauffement général</div>
            <div style={{fontSize:11,color:C.muted,marginTop:2}}>Cardio / mobilité avant les barres</div>
          </div>
          <button onClick={()=>upd("generalWarmup",{...gw,enabled:!gw.enabled})}
            style={{padding:"5px 12px",borderRadius:6,fontSize:12,fontWeight:700,
              background:gw.enabled?C.blueDim:C.surface2,
              border:`1px solid ${gw.enabled?C.blueBorder:C.border}`,color:gw.enabled?C.blue:C.muted}}>
            {gw.enabled?"ON":"OFF"}
          </button>
        </div>
        {gw.enabled && (
          <div style={{display:"flex",alignItems:"center",gap:8,marginTop:10}}>
            <span style={{fontSize:11,color:C.muted}}>Durée</span>
            <input type="number" value={gw.duration??20} min={5} max={120}
              onChange={e=>upd("generalWarmup",{...gw,duration:parseInt(e.target.value)||20})}
              style={{...inp,width:70,padding:"6px 8px",fontSize:14,textAlign:"center"}} />
            <span style={{fontSize:11,color:C.muted}}>min</span>
          </div>
        )}
      </div>

      <div style={{display:"grid",gridTemplateColumns:"24px 1fr 72px 88px 34px",gap:8,padding:"0 8px"}}>
        {["#","Poids","Horaire","",""].map((h,i)=>(
          <div key={i} style={{fontSize:9,color:C.muted,textTransform:"uppercase",letterSpacing:"0.1em"}}>{h}</div>
        ))}
      </div>
      {ws.map((set,i)=>{
        const sc = schedule.find(s=>s.type==="warmup"&&s.index===i);
        return (
          <div key={set.id} style={{display:"grid",gridTemplateColumns:"24px 1fr 72px 88px 34px",gap:8,alignItems:"center",
            padding:"10px 8px",borderRadius:8,background:C.surface,border:`1px solid ${C.border}`}}>
            <span style={{fontFamily:"'DM Mono',monospace",fontSize:12,color:C.muted,textAlign:"center"}}>{i+1}</span>
            <div style={{display:"flex",alignItems:"center",gap:5}}>
              <input type="number" value={set.weight} onChange={e=>updSet(i,+e.target.value)}
                style={{...inp,width:66,fontSize:15,padding:"8px",textAlign:"center"}} />
              <span style={{fontSize:11,color:C.muted}}>kg</span>
            </div>
            {sc
              ? <><span style={{fontFamily:"'DM Mono',monospace",fontSize:13,color:C.text}}>{sc.startTime}</span><Countdown targetMin={sc.startMin} sm/></>
              : <><span style={{color:C.muted,fontSize:11}}>—</span><span/></>
            }
            <button onClick={()=>rmSet(i)} style={{...btnDanger,padding:"7px 8px",fontSize:13,textAlign:"center"}}>✕</button>
          </div>
        );
      })}
      <button onClick={addSet} style={btnGhost}>+ Ajouter une barre</button>
    </div>
  );
}

// ─── GroupEditor ──────────────────────────────────────────────────────────────
function GroupEditor({ group, comp, onUpdate, onRemove, canRemove }) {
  const { C, inp, btnDanger } = useTheme();
  const [movTab,setMovTab]=useState("squat");
  const [editName,setEditName]=useState(false);
  const [nameVal,setNameVal]=useState(group.name);
  const saveName = () => { setEditName(false); if(nameVal.trim()) onUpdate({...group,name:nameVal.trim()}); };
  const compStartTime = getMovStartTime(comp, group.id, movTab);
  const athleteCount = comp.athletes.filter(a=>a.groupId===group.id).length;
  const mc = movColor(C, movTab);

  return (
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        {editName
          ? <input autoFocus value={nameVal} onChange={e=>setNameVal(e.target.value)} onBlur={saveName} onKeyDown={e=>e.key==="Enter"&&saveName()}
              style={{...inp,flex:1,fontSize:17,fontWeight:700}}/>
          : <div onClick={()=>{setEditName(true);setNameVal(group.name);}}
              style={{flex:1,fontSize:17,fontWeight:700,color:C.text,cursor:"text",display:"flex",alignItems:"center",gap:8}}>
              {group.name} <span style={{fontSize:11,color:C.muted,fontWeight:400}}>✏️</span>
            </div>
        }
        {canRemove && <button onClick={onRemove} style={btnDanger}>Supprimer</button>}
      </div>

      <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",
        background:C.surface,border:`1px solid ${C.border}`,borderRadius:9,flexWrap:"wrap"}}>
        <span style={{fontSize:11,color:C.muted}}>👥 {athleteCount} athlète{athleteCount>1?"s":""}</span>
        <span style={{width:1,height:14,background:C.border}}/>
        <span style={{fontSize:10,color:C.muted,textTransform:"uppercase",letterSpacing:"0.08em"}}>Décalage départ</span>
        <input type="number" value={group.offset} min={-120} max={300}
          onChange={e=>onUpdate({...group,offset:parseInt(e.target.value)||0})}
          style={{...inp,width:70,padding:"5px 8px",fontSize:14,textAlign:"center"}} />
        <span style={{fontSize:11,color:C.muted}}>min</span>
        {group.offset!==0&&<span style={{fontSize:12,fontWeight:700,color:C.gold,fontFamily:"'DM Mono',monospace"}}>{group.offset>0?"+":""}{group.offset}min</span>}
      </div>

      <div style={{display:"flex",background:"rgba(0,0,0,0.3)",borderRadius:11,padding:4,gap:3}}>
        {MOV_ORDER.map(mk=>{
          const mc2 = movColor(C, mk);
          return (
            <button key={mk} onClick={()=>setMovTab(mk)}
              style={{flex:1,padding:"10px 6px",borderRadius:8,border:"none",fontSize:13,fontWeight:700,
                background:movTab===mk?`${mc2}1A`:"transparent",
                color:movTab===mk?mc2:C.muted,
                borderBottom:movTab===mk?`2px solid ${mc2}`:"2px solid transparent",transition:"all 0.15s"}}>
              {mk==="squat"?"SQ":mk==="bench"?"BP":"DL"}
            </button>
          );
        })}
      </div>

      <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",
        background:`${mc}08`, border:`1px solid ${mc}25`,borderRadius:9}}>
        <span style={{fontSize:11,color:C.muted,textTransform:"uppercase",letterSpacing:"0.09em",flexShrink:0}}>
          Départ {movTab==="squat"?"Squat":movTab==="bench"?"Bench":"Deadlift"}
        </span>
        <input type="time" value={compStartTime}
          onChange={e=>{
            const newMin=timeToMinutes(e.target.value);
            const baseMin=timeToMinutes(comp.compStartTime||"10:00");
            const newOffsets={...(comp.movementOffsets||{}),[movTab]:newMin-baseMin-group.offset};
            onUpdate({...group, _compMovOffsets:newOffsets});
          }}
          style={{...inp,width:"auto",padding:"7px 10px",fontSize:14,borderColor:`${mc}30`}}/>
        <span style={{fontSize:10,color:C.muted,fontFamily:"'DM Mono',monospace"}}>{compStartTime}</span>
      </div>

      <div style={{padding:"12px 14px",background:C.blueDim,border:`1px solid ${C.blueBorder}`,borderRadius:9,fontSize:12,color:C.blue,lineHeight:1.6}}>
        💡 La configuration d'échauffement est désormais <strong>par athlète</strong>. Sélectionne un athlète pour configurer ses séries, ses temps de repos et son échauffement général.
      </div>
    </div>
  );

function AthleteEditor({ athlete, comp, onUpdate, onRemove, canRemove }) {
  const { C, inp, btnDanger } = useTheme();
  const [movTab,setMovTab]=useState("squat");
  const [editName,setEditName]=useState(false);
  const [nameVal,setNameVal]=useState(athlete.name);
  const saveName = () => { setEditName(false); if(nameVal.trim()) onUpdate({...athlete,name:nameVal.trim()}); };

  const updMov = (k,v) => onUpdate({...athlete,movements:{...athlete.movements,[movTab]:{...athlete.movements[movTab],[k]:v}}});
  const updMovFull = (v) => onUpdate({...athlete,movements:{...athlete.movements,[movTab]:v}});

  const compStartTime = getMovStartTime(comp, athlete.groupId, movTab);
  const athMov = athlete.movements[movTab] || defaultMovement();
  const schedule = computeSchedule(athMov, compStartTime, athMov.position, 0);
  const liftMin = timeToMinutes(compStartTime) + (athMov.position - 1);
  const first = schedule.find(s=>s.type==="general") || schedule[0];

                background:movTab===mk?`${mc2}1A`:"transparent",
                color:movTab===mk?mc2:C.muted,
                borderBottom:movTab===mk?`2px solid ${mc2}`:"2px solid transparent",transition:"all 0.15s"}}>
              {mk==="squat"?"SQ":mk==="bench"?"BP":"DL"}
            </button>
          );
        })}
      </div>

      {first && (
        <div style={{display:"flex",gap:12,padding:"12px 14px",background:`${mc}0E`,borderRadius:10,border:`1px solid ${mc}30`,flexWrap:"wrap",alignItems:"center"}}>
          <div>
            <div style={{fontSize:9,color:C.muted,textTransform:"uppercase",letterSpacing:"0.1em"}}>{athMov.generalWarmup?.enabled!==false?"Départ éch.":"1ère barre"}</div>
            <div style={{fontFamily:"'DM Mono',monospace",fontSize:22,fontWeight:700,color:mc}}>{first.startTime}</div>
          </div>
          <div style={{width:1,height:34,background:`${mc}33`}}/>
          <div>
            <div style={{fontSize:9,color:C.muted,textTransform:"uppercase",letterSpacing:"0.1em"}}>Passage</div>
            <div style={{fontFamily:"'DM Mono',monospace",fontSize:22,fontWeight:700,color:"#e0966b"}}>{minutesToTime(liftMin)}</div>
          </div>
          {athMov.openerWeight&&<>
            <div style={{width:1,height:34,background:`${mc}33`}}/>
            <div>
              <div style={{fontSize:9,color:C.muted,textTransform:"uppercase",letterSpacing:"0.1em"}}>Opener</div>
              <div style={{fontFamily:"'DM Mono',monospace",fontSize:22,fontWeight:700,color:mc}}>{athMov.openerWeight} kg</div>

          </>}
          <div style={{marginLeft:"auto"}}><Countdown targetMin={first.startMin}/></div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <div>
          <div style={{fontSize:10,color:C.muted,marginBottom:5,textTransform:"uppercase",letterSpacing:"0.09em"}}>Position (ordre)</div>
          <input type="number" value={athMov.position} min={1} max={99}

            style={{...inp,fontSize:14,padding:"10px"}} />

        <div>
          <div style={{fontSize:10,color:C.muted,marginBottom:5,textTransform:"uppercase",letterSpacing:"0.09em"}}>Opener (kg)</div>
          <input type="number" value={athMov.openerWeight||""} min={0} placeholder="—"
            onChange={e=>updMov("openerWeight",e.target.value)}

// ─── GroupsManager ────────────────────────────────────────────────────────────
function GroupsManager({ comp, onUpdate }) {
  const { C, btnGhost, btnDanger } = useTheme();
  const addGroup = () => {
    const lastOffset = comp.groups.length > 0 ? (comp.groups[comp.groups.length-1].offset ?? 0) : 0;
    const g = {...defaultGroup(`Groupe ${comp.groups.length+1}`), offset: lastOffset + 30};
    onUpdate({...comp, groups:[...comp.groups,g]});
  };
  const rmGroup = gId => {
    if (comp.groups.length<=1) return;
    const fb = comp.groups.find(g=>g.id!==gId)?.id;
    onUpdate({
      ...comp,
      groups:comp.groups.filter(g=>g.id!==gId),
      athletes:comp.athletes.map(a=>a.groupId===gId?{...a,groupId:fb}:a),
    });
  };
  return (
    <div>
      <div style={{fontSize:9,color:C.muted,textTransform:"uppercase",letterSpacing:"0.15em",marginBottom:8,padding:"0 2px"}}>Groupes</div>
      {comp.groups.map(g=>(
        <div key={g.id} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",
          background:C.surface,border:`1px solid ${C.border}`,borderRadius:7,marginBottom:5}}>
          <span style={{flex:1,fontSize:12,fontWeight:600,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{g.name}</span>
          <span style={{fontSize:10,color:C.muted,flexShrink:0}}>{comp.athletes.filter(a=>a.groupId===g.id).length} ath.</span>
          {g.offset!==0&&<span style={{fontSize:10,color:C.gold,fontFamily:"'DM Mono',monospace",flexShrink:0}}>{g.offset>0?"+":""}{g.offset}min</span>}
          {comp.groups.length>1&&<button onClick={()=>rmGroup(g.id)} style={{...btnDanger,padding:"3px 8px",fontSize:11}}>✕</button>}
        </div>
      ))}
      <button onClick={addGroup} style={{...btnGhost,fontSize:12,padding:"9px"}}>+ Nouveau groupe</button>
    </div>
  );
}

// ─── LaunchCard ───────────────────────────────────────────────────────────────
function LaunchCard({ athlete, comp, onUpdate, onPosUp, onPosDown, canUp, canDown, delay, notifGranted }) {
  const { C, btnGold, btnGhost } = useTheme();
  const movKey = athlete.currentMovement||"squat";
  const mov = athlete.movements[movKey] || defaultMovement();
  const mc = movColor(C, movKey);
  const compStartTime = getMovStartTime(comp, athlete.groupId, movKey);
  const schedule = computeSchedule(mov, compStartTime, mov.position||1, delay);
  const liftMin = timeToMinutes(compStartTime) + (mov.position||1) - 1 + delay;
  const doneSets = mov.doneSets||{};
  const alertedRef = useRef({});
  const warnedRef = useRef({});

  useEffect(()=>{
    if (!schedule.length) return;
    const iv = setInterval(()=>{
      const now = nowSeconds();
      schedule.forEach(sc=>{
        const k = setKey(sc);
        if (doneSets[k]) return;
        const diff = sc.startMin*60-now;
        if (diff<=32&&diff>24&&!warnedRef.current[k]) {
          warnedRef.current[k]=true;
          playWarn();
          if (notifGranted) try {
            const lbl = sc.type==="general"?"Échauffement général":`Série ${sc.index+1}`;
            new Notification(`⏱️ ${athlete.name} — ${movKey==="squat"?"Squat":movKey==="bench"?"Bench":"Deadlift"} ${lbl} dans 30s`,{body:"Prépare-toi !",tag:`w-${athlete.id}-${k}`,silent:false});
          } catch(e){}
        }
        if (diff<=3&&diff>-8&&!alertedRef.current[k]) {
          alertedRef.current[k]=true;
          playAlert();
          if (notifGranted) try {
            const lbl = sc.type==="general"?"Échauffement général":`Série ${sc.index+1}`;
            const body = sc.type==="general"?`Commence ! (${sc.duration}min)`:`${sc.weight} kg`;
            new Notification(`🚨 ${athlete.name} — ${movKey==="squat"?"Squat":movKey==="bench"?"Bench":"Deadlift"}`,{body:`C'est l'heure ! ${lbl} — ${body}`,tag:`a-${athlete.id}-${k}`,requireInteraction:true});
          } catch(e){}
        }
        if (diff<-40){delete alertedRef.current[k];delete warnedRef.current[k];}
      });
    },500);
    return ()=>clearInterval(iv);
  },[schedule,doneSets,athlete.id,athlete.name,movKey,notifGranted]);

  const toggleDone = sc => {
    const k = setKey(sc);
    const next = {...doneSets,[k]:!doneSets[k]};
    onUpdate({...athlete,movements:{...athlete.movements,[movKey]:{...mov,doneSets:next}}});
  };
  const allDone = schedule.length>0&&schedule.every(sc=>!!doneSets[setKey(sc)]);
  const nextSc = schedule.find(sc=>!doneSets[setKey(sc)]);
  const movIdx = MOV_ORDER.indexOf(movKey);
  const hasNext = movIdx<MOV_ORDER.length-1;
  const hasPrev = movIdx>0;

  return (
    <div style={{background:C.surface,border:`1px solid ${allDone?C.greenBorder:C.border}`,borderRadius:13,overflow:"hidden",transition:"border-color 0.3s"}}>
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"12px 14px",
        background:allDone?C.greenDim:C.surface2,borderBottom:`1px solid ${C.border}`}}>
        <div style={{width:8,height:8,borderRadius:"50%",flexShrink:0,
          background:allDone?C.green:nextSc?mc:C.muted}}/>
        <span style={{fontWeight:700,fontSize:15,flex:1,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{athlete.name}</span>
        <span style={{fontSize:11,fontWeight:700,color:mc,background:`${mc}15`,border:`1px solid ${mc}30`,padding:"2px 8px",borderRadius:5}}>{movKey==="squat"?"SQ":movKey==="bench"?"BP":"DL"}</span>
        <div style={{display:"flex",alignItems:"center",gap:3}}>
          <button disabled={!canUp} onClick={onPosUp}
            style={{width:28,height:28,borderRadius:5,border:`1px solid ${C.border}`,background:C.surface2,
              color:canUp?C.text:C.muted,cursor:canUp?"pointer":"default",fontSize:13,display:"flex",alignItems:"center",justifyContent:"center"}}>↑</button>
          <span style={{fontFamily:"'DM Mono',monospace",fontSize:12,color:C.gold,minWidth:18,textAlign:"center"}}>{mov.position||1}</span>
          <button disabled={!canDown} onClick={onPosDown}
            style={{width:28,height:28,borderRadius:5,border:`1px solid ${C.border}`,background:C.surface2,
              color:canDown?C.text:C.muted,cursor:canDown?"pointer":"default",fontSize:13,display:"flex",alignItems:"center",justifyContent:"center"}}>↓</button>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{fontSize:9,color:C.muted,textTransform:"uppercase",letterSpacing:"0.08em"}}>Passage</div>
          <div style={{fontFamily:"'DM Mono',monospace",fontSize:15,fontWeight:700,color:"#e0966b"}}>{minutesToTime(liftMin)}</div>
        </div>
      </div>

      <div style={{padding:"10px 12px",display:"flex",flexDirection:"column",gap:6}}>
        {schedule.map((sc,i)=>{
          const k = setKey(sc);
          const isDone = !!doneSets[k];
          const isNext = sc===nextSc&&!allDone;
          const diff = sc.startMin*60-nowSeconds();
          const isUrgent = !isDone&&Math.abs(diff)<90;
          const isGeneral = sc.type==="general";
          return (
            <div key={sc.id||i} style={{display:"grid",gridTemplateColumns:"24px 1fr auto auto 36px",gap:8,alignItems:"center",
              padding:"9px 10px",borderRadius:8,transition:"all 0.2s",
              background:isDone?C.greenDim:isUrgent?C.goldDim:isNext?C.surface2:"transparent",
              border:`1px solid ${isDone?C.greenBorder:isUrgent?C.goldBorder:isNext?C.border2:"transparent"}`,
              opacity:isDone?0.5:1}}>
              <span style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:isGeneral?C.blue:C.muted,textAlign:"center"}}>{isGeneral?"⏱":i}</span>
              {isGeneral
                ? <span style={{fontSize:13,fontWeight:isDone?400:600,color:isDone?C.muted:C.blue}}>Éch. général <span style={{fontSize:11,color:C.muted,fontWeight:400}}>{sc.duration}min</span></span>
                : <span style={{fontFamily:"'DM Mono',monospace",fontSize:15,fontWeight:isDone?400:600,
                    color:isDone?C.muted:isNext?mc:C.text,textDecoration:isDone?"line-through":"none"}}>
                    {sc.weight} <span style={{fontSize:11,color:C.muted,fontWeight:400}}>kg</span>
                  </span>
              }
              <span style={{fontFamily:"'DM Mono',monospace",fontSize:12,color:isDone?C.muted:C.text}}>{sc.startTime}</span>
              {isDone ? <span style={{fontSize:11,color:C.green,fontWeight:700}}>✓</span> : isNext ? <Countdown targetMin={sc.startMin} sm/> : <span/>}
              <button onClick={()=>toggleDone(sc)}
                style={{width:32,height:32,borderRadius:7,display:"flex",alignItems:"center",justifyContent:"center",
                  background:isDone?C.greenDim:C.surface2,
                  border:`1px solid ${isDone?C.greenBorder:C.border}`,
                  color:isDone?C.green:C.muted,fontSize:15}}>
                {isDone?"✓":"○"}
              </button>
            </div>
          );
        })}

        {mov.openerWeight && (
          <div style={{display:"grid",gridTemplateColumns:"24px 1fr auto auto 36px",gap:8,alignItems:"center",
            padding:"9px 10px",borderRadius:8,background:`${mc}08`,border:`1px dashed ${mc}35`}}>
            <span style={{color:mc,fontSize:12,textAlign:"center"}}>★</span>
            <span style={{fontFamily:"'DM Mono',monospace",fontSize:15,fontWeight:600,color:mc}}>{mov.openerWeight} <span style={{fontSize:11,color:C.muted,fontWeight:400}}>kg opener</span></span>
            <span style={{fontFamily:"'DM Mono',monospace",fontSize:12,color:"#e0966b"}}>{minutesToTime(liftMin)}</span>
            <Countdown targetMin={liftMin} sm/>
            <span/>
          </div>
        )}

        {mov.openerWeight && (
          <details style={{marginTop:2}}>
            <summary style={{cursor:"pointer",fontSize:11,color:C.muted,padding:"4px 0",listStyle:"none",display:"flex",alignItems:"center",gap:4}}>
              <span>▸</span> PLAN DE MATCH
            </summary>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginTop:8}}>
              {PLANS.map(p=>(
                <div key={p.key} style={{background:`${planColor(C,p.key)}0A`,border:`1px solid ${planColor(C,p.key)}22`,borderRadius:7,padding:"8px 6px"}}>
                  <div style={{fontSize:9,color:planColor(C,p.key),fontWeight:700,textAlign:"center",marginBottom:6,letterSpacing:"0.06em"}}>{p.label.toUpperCase()}</div>
                  {[{k:"attempt2",l:"2ème"},{k:"attempt3",l:"3ème"}].map(a=>(
                    <div key={a.k} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
                      <span style={{fontSize:9,color:C.muted}}>{a.l}</span>
                      <span style={{fontFamily:"'DM Mono',monospace",fontSize:12,fontWeight:600,color:planColor(C,p.key)}}>
                        {mov.gamePlan?.[a.k]?.[p.key]||"—"}{mov.gamePlan?.[a.k]?.[p.key]?" kg":""}
                      </span>
                    </div>
                  ))}
                </div>
              ))}
            </div>
          </details>
        )}

        <div style={{display:"flex",gap:8,marginTop:4}}>
          {hasPrev && (
            <button onClick={()=>onUpdate({...athlete,currentMovement:MOV_ORDER[movIdx-1]})}
              style={{...btnGhost,fontSize:12,padding:"9px 12px",flex:1}}>
              ← {MOV_ORDER[movIdx-1]==="squat"?"Squat":MOV_ORDER[movIdx-1]==="bench"?"Bench":"Deadlift"}
            </button>
          )}
          {allDone && hasNext && (
            <button onClick={()=>onUpdate({...athlete,currentMovement:MOV_ORDER[movIdx+1]})}
              style={{...btnGold,fontSize:13,padding:"12px",flex:2}}>
              → {MOV_ORDER[movIdx+1]==="squat"?"Squat":MOV_ORDER[movIdx+1]==="bench"?"Bench":"Deadlift"}
            </button>
          )}
          {allDone && !hasNext && (
            <div style={{textAlign:"center",padding:"10px",color:C.green,fontSize:13,fontWeight:700,flex:1}}>✅ Terminé !</div>
          )}
        </div>
      </div>
    </div>
  );
}

          </span>
        )}
        {/* Actions */}
        {canRemove && <button onClick={onRemove} style={{...btnDanger, padding:"3px 8px", fontSize:11, flexShrink:0}}>✕</button>}
        <button onClick={()=>setExpanded(e=>!e)} style={{background:"transparent", border:"none", color:C.muted, fontSize:13, padding:"2px 5px", cursor:"pointer", flexShrink:0}}>
          {expanded?"▲":"▼"}
        </button>
      </div>

      {/* Timeline éditable */}
      <div style={{display:"flex", gap:0, background:C.surface, borderBottom:`1px solid ${C.border}`}}>
        {MOV_ORDER.map((mk,i)=>{
          const mc = movColor(C, mk);
          const curTime = getMovStartTime(comp, group.id, mk);
          return (
            <div key={mk} style={{flex:1, padding:"4px 6px", textAlign:"center",
              borderRight: i<2 ? `1px solid ${C.border}` : "none"}}>
              <div style={{fontSize:8, fontWeight:700, color:mc, letterSpacing:"0.08em", marginBottom:2}}>
                {mk==="squat"?"SQ":mk==="bench"?"BP":"DL"}
              </div>
              <input type="time" value={curTime}
                onChange={e=>{
                  if (!onUpdComp) return;
                  const newMin = timeToMinutes(e.target.value);
                  const delta = newMin - timeToMinutes(curTime);
                  if (delta === 0) return;
                  // Modifie uniquement ce groupe + ce mouvement
                  const gmo = {...(comp.groupMovOffsets||{})};
                  gmo[group.id] = {...(gmo[group.id]||{}), [mk]: ((gmo[group.id]?.[mk])??0) + delta};
                  onUpdComp({...comp, groupMovOffsets: gmo});
                }}
                style={{fontFamily:"'DM Mono',monospace", fontSize:12, fontWeight:700,
                  color:C.text, background:"transparent", border:`1px solid transparent`,
                  borderRadius:5, padding:"2px 3px", width:"100%", textAlign:"center",
                  outline:"none", cursor:"pointer",
                  transition:"border-color 0.15s"}}
                onFocus={e=>e.target.style.borderColor=`${mc}55`}
                onBlur={e=>e.target.style.borderColor="transparent"}
              />
            </div>
          );
        })}
      </div>

      {/* Liste athlètes */}
      {expanded && groupAthletes.length > 0 && (
        <div style={{padding:"8px 10px", display:"flex", flexDirection:"column", gap:5, background:C.surface}}>
          {groupAthletes.map(a => {
            return (
              <div key={a.id} onClick={()=>onSelectAthlete(a.id)}
                style={{display:"flex", alignItems:"center", justifyContent:"space-between",
                  padding:"8px 10px", borderRadius:7, cursor:"pointer",
                  background:C.surface2, border:`1px solid ${C.border}`, transition:"background 0.12s"}}
                onMouseEnter={e=>e.currentTarget.style.background=C.goldDim}
                onMouseLeave={e=>e.currentTarget.style.background=C.surface2}>
                <div style={{display:"flex", alignItems:"center", gap:8, minWidth:0}}>
                  <span style={{fontSize:13, fontWeight:600, color:C.text,
                    overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap"}}>{a.name}</span>
                  <span style={{fontSize:9, color:C.muted, fontFamily:"'DM Mono',monospace", flexShrink:0}}>
                    #{a.movements[a.currentMovement||"squat"]?.position||1}
                  </span>
                </div>
                <div style={{display:"flex", alignItems:"center", gap:4, flexShrink:0}}>
                  {MOV_ORDER.map(mk=>{
                    const mc=movColor(C,mk);
                    const hasCfg=!!a.movements[mk]?.openerWeight;
                    return (
                      <span key={mk} style={{fontSize:9, padding:"2px 5px", borderRadius:4, fontWeight:700,
                        background:hasCfg?`${mc}18`:C.surface,
                        color:hasCfg?mc:C.muted,
                        border:`1px solid ${hasCfg?`${mc}30`:C.border}`}}>
                        {mk==="squat"?"SQ":mk==="bench"?"BP":"DL"}
                        {hasCfg&&` ${a.movements[mk].openerWeight}kg`}
                      </span>
                    );
                  })}
                </div>
              </div>
            );
          })}
          <button onClick={e=>{e.stopPropagation();onAddAthlete(group.id);}}
            style={{background:C.greenDim, border:`1px dashed ${C.greenBorder}`, borderRadius:7,
              color:C.green, fontSize:11, fontWeight:700, padding:"7px 10px", width:"100%",
              marginTop:2, cursor:"pointer"}}>
            + Athlète
          </button>
        </div>
      )}
      {expanded && groupAthletes.length === 0 && (
        <div style={{padding:"12px", textAlign:"center", fontSize:11, color:C.muted, fontStyle:"italic", background:C.surface}}>
          <button onClick={()=>onAddAthlete(group.id)}
            style={{background:C.greenDim, border:`1px dashed ${C.greenBorder}`, borderRadius:7,
              color:C.green, fontSize:11, fontWeight:700, padding:"7px 14px", cursor:"pointer"}}>
            + Athlète
          </button>
        </div>
      )}
    </div>
  );
}

// ─── CompOverview ─────────────────────────────────────────────────────────────

  const totalWithOpener = comp.athletes.filter(a =>
    MOV_ORDER.some(mk => a.movements[mk]?.openerWeight)
  ).length;

  const { timeline } = computeFullTimeline(comp);

  const movStartGlobal = (mk) => {
    const base = timeToMinutes(comp.compStartTime || "10:00");
    const off = comp.movementOffsets?.[mk] ?? { squat:0, bench:180, deadlift:360 }[mk] ?? 0;
    return minutesToTime(base + off);
  };

  return (
    <div style={{display:"flex",flexDirection:"column",gap:18}}>

      {/* ── Titre + date */}
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:10,flexWrap:"wrap"}}>

              {comp.date ? formatDate(comp.date) : "Date non définie"}
            </div>
          </div>
          {days !== null && (
            <div style={{padding:"5px 12px",borderRadius:6,fontWeight:800,fontSize:14,flexShrink:0,
              background:days===0?C.redDim:days<0?C.surface:C.goldDim,
              color:days===0?C.red:days<0?C.muted:C.gold,
              border:`1px solid ${days===0?C.redBorder:days<0?C.border:C.goldBorder}`}}>
              {days===0?"AUJOURD'HUI":days>0?`J-${days}`:`J+${Math.abs(days)}`}
            </div>
          )}
        </div>

        {/* Date picker */}
        <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
          <div style={{flex:1,minWidth:130}}>
            <div style={{fontSize:9,color:C.muted,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:4}}>Date</div>
            <input type="date" value={comp.date||""} onChange={e=>{onMarkDirty();onUpdComp({...comp,date:e.target.value});}}
              style={{...inp,fontSize:13,padding:"8px 10px"}}/>
          </div>
          <div style={{minWidth:100}}>
            <div style={{fontSize:9,color:C.muted,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:4}}>Début compét.</div>
            <input type="time" value={comp.compStartTime||"10:00"}
              onChange={e=>{onMarkDirty();onUpdComp({...comp,compStartTime:e.target.value});}}
              style={{...inp,width:"auto",padding:"8px 10px",fontSize:13}}/>
          </div>
        </div>
      </div>

      {/* ── Stats rapides */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
        {[
          { label:"Athlètes", value:totalAthletes, color:C.gold },
          { label:"Groupes",  value:totalGroups,   color:C.blue },
          { label:"Configurés", value:totalWithOpener, color:C.green },
        ].map(s=>(
          <div key={s.label} style={{padding:"12px 8px",borderRadius:9,background:C.surface,border:`1px solid ${C.border}`,textAlign:"center"}}>
            <div style={{fontSize:24,fontWeight:800,color:s.color,fontFamily:"'DM Mono',monospace",lineHeight:1}}>{s.value}</div>
            <div style={{fontSize:10,color:C.muted,marginTop:4,letterSpacing:"0.06em"}}>{s.label}</div>

      {/* ── Groupes inline */}

        <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:10}}>
          <div style={{fontSize:9,color:C.muted,textTransform:"uppercase",letterSpacing:"0.14em"}}>Groupes</div>
          <button onClick={onRecalcTiming}
            style={{fontSize:10, fontWeight:700, padding:"4px 10px", borderRadius:6,
              background:C.blueDim, border:`1px solid ${C.blueBorder}`, color:C.blue, letterSpacing:"0.04em"}}>
            ⟳ Recalculer le timing

        <div style={{fontSize:10, color:C.muted, marginBottom:8, lineHeight:1.6,
          padding:"8px 10px", background:C.surface, borderRadius:8, border:`1px solid ${C.border}`}}>
          💡 Le timing se recalcule <strong style={{color:C.blue}}>automatiquement</strong> dès que vous modifiez le nombre d'athlètes prévu (3 essais × N athlètes × 1min, 10min de pause entre mouvements). Utilisez ⟳ pour forcer un recalcul manuel.
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {comp.groups.map(group=>(
            <InlineGroupCard
              key={group.id}
              group={group}

              onUpdGroup={g=>{onMarkDirty();onUpdGroup(g);}}

              onRemove={()=>{onMarkDirty();/* handled by parent */; onUpdGroup({...group, _remove:true});}}
              canRemove={comp.groups.length>1}
              onAddAthlete={onAddAthleteToGroup}
              onSelectAthlete={onSelectAthlete}
            />
          ))}

      {/* ── Actions */}

        <button onClick={onAddGroup} style={{...btnGhost, fontSize:13, padding:"11px"}}>+ Ajouter un groupe</button>
        <button onClick={onLaunch} style={btnGold}>🚀 Lancer la compétition</button>
      </div>
    </div>
  );
}

// ─── App ──────────────────────────────────────────────────────────────────────
function App() {
  const [config,setConfig]=useState(undefined);
  const [comps,setComps]=useState([]);
  const [selCompId,setSelCompId]=useState(null);
  const [selAthleteId,setSelAthleteId]=useState(null);
  const [selGroupId,setSelGroupId]=useState(null);
  const [launchMode,setLaunchMode]=useState(false);
  const [notifGranted,setNotifGranted]=useState(()=>{ try { return Notification?.permission==="granted"; } catch(e){return false;} });
  const [clock,setClock]=useState("");
  const [delay,setDelay]=useState(0);
  const [delayInp,setDelayInp]=useState("0");
  const [syncing,setSyncing]=useState(false);
  const [syncErr,setSyncErr]=useState(false);
  const [retryTick,setRetryTick]=useState(0); // incrémenté pour forcer un retry de sauvegarde
  const [mobileScreen,setMobileScreen]=useState("comps");
  const [showSettings,setShowSettings]=useState(false);
  const [showTutorial,setShowTutorial]=useState(false);
  const [winW,setWinW]=useState(typeof window!=="undefined"?window.innerWidth:375);
  const [openGroups,setOpenGroups]=useState({});
  const [showDelay,setShowDelay]=useState(false);
  const [darkMode,setDarkMode]=useState(()=>localStorage.getItem("defcon_theme")!=="light");
  const [teamRoster,setTeamRoster]=useState([]);

  const isDirty=useRef(false);
  const saveTimer=useRef(null);
  const esRef=useRef(null);
  const isMobile = winW<768;

  const C = darkMode ? DARK : LIGHT;
  const styles = useMemo(()=>makeStyles(C),[darkMode]);
  const { inp, btnGold, btnGhost, btnSm, btnDanger } = styles;
  const themeValue = { C, ...styles, darkMode, setDarkMode };

  useEffect(()=>{
    document.body.style.background = C.bg;
    document.body.style.color = C.text;
  },[darkMode]);

  useEffect(()=>{
    const h=()=>setWinW(window.innerWidth);
    window.addEventListener("resize",h);
    return()=>window.removeEventListener("resize",h);
  },[]);

  useEffect(()=>{
    const tick=()=>{ const n=new Date(); setClock(`${String(n.getHours()).padStart(2,"0")}:${String(n.getMinutes()).padStart(2,"0")}:${String(n.getSeconds()).padStart(2,"0")}`); };
    tick(); const iv=setInterval(tick,1000); return()=>clearInterval(iv);
  },[]);

  useEffect(()=>{
    const s=localStorage.getItem("defcon_cfg");
    if (s){
      try{
        const cfg=JSON.parse(s);
        if (!cfg.offline && cfg.url !== FB_URL) { cfg.url=FB_URL; localStorage.setItem("defcon_cfg",JSON.stringify(cfg)); }
        setConfig(cfg);
      }catch{setConfig(null);}
    } else setConfig(null);
  },[]);

  // Auto-afficher le tutoriel au premier lancement après le setup
  useEffect(()=>{
    if (config && config!==undefined && !localStorage.getItem("defcon_tutorial_seen")){
      setShowTutorial(true);
    }
  },[config]);

  useEffect(()=>{
    if (config===undefined||config===null) return;
    const applyData = (data)=>{
      if (!data?.competitions) return false;
      const migrated = data.competitions.map(migrateComp).filter(Boolean);
      setComps(migrated);
      if (data.teamRoster) setTeamRoster(data.teamRoster);
      if (!selCompId && migrated.length) {
        setSelCompId(migrated[0].id);
      }
      return true;
    };
    if (config.offline){
      const s=localStorage.getItem("defcon_data");
      if (s){try{applyData(JSON.parse(s));}catch{}}
      if (!s){
        const init=[defaultComp("Ma première compétition")];
        setComps(init);setSelCompId(init[0].id);
      }
      return;
    }
    fbGet(config.url,config.code).then(data=>{
      if (!applyData(data)){
        const init=[defaultComp("Ma première compétition")];
        setComps(init);setSelCompId(init[0].id);
      }
    });
    const url=`${config.url}/teams/${encodeURIComponent(config.code)}.json?alt=sse`;
    try {
      const es=new EventSource(url); esRef.current=es;
      es.addEventListener("put",e=>{ try { const {data}=JSON.parse(e.data); if(data?.competitions&&!isDirty.current) applyData(data); } catch{} });
      es.onerror=()=>setSyncErr(true); es.onopen=()=>setSyncErr(false);
      return()=>{es.close();esRef.current=null;};
    } catch(e){}
  },[config]);

  useEffect(()=>{
    if (!isDirty.current||!config||!comps.length) return;
    clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(()=>{
      const payload={competitions:comps,teamRoster,version:Date.now(),...(config.passwordHash?{passwordHash:config.passwordHash}:{})};
      if (config.offline){localStorage.setItem("defcon_data",JSON.stringify(payload));isDirty.current=false;return;}
      setSyncing(true);
      fbSet(config.url,config.code,payload).then(ok=>{
        setSyncing(false);
        setSyncErr(!ok);
        if(ok){
          isDirty.current=false; // ✅ seulement si succès
        } else {
          // Échec : isDirty reste true → la SSE ne pourra pas écraser les données locales
          // Retry automatique dans 5 secondes
          saveTimer.current=setTimeout(()=>{
            if(!isDirty.current) return;
            setRetryTick(t=>t+1);
          },5000);
        }
      });
    },700);
  },[comps,config,retryTick]);

  // Sync du retard vers Firebase — l'app athlète le lit via selComp.liveDelay
  useEffect(()=>{
    if(!launchMode||!selComp)return;
    if((selComp.liveDelay||0)===delay)return; // évite la boucle infinie
    markDirty();
    setComps(prev=>prev.map(c=>c.id===selCompId?{...c,liveDelay:delay}:c));
  },[delay,launchMode]);

  function reqNotifs(){
    initAudio();
    // ── Détection iOS ──────────────────────────────────────────────────────────
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
    const isStandalone = window.navigator.standalone === true;
    if(isIOS && !isStandalone){
      alert("📱 iPhone / iPad détecté\n\nLes notifications ne fonctionnent que si l'app est installée sur l'écran d'accueil.\n\nComment faire :\n1. Appuie sur ⬆️ (Partager) dans Safari\n2. Sélectionne « Sur l'écran d'accueil »\n3. Ouvre l'app depuis l'écran d'accueil\n4. Reviens ici pour activer les notifications");
      return;
    }
    // ── Vérifications standard ─────────────────────────────────────────────────
    if (!("Notification" in window)) {
      alert("Les notifications ne sont pas supportées sur cet appareil/navigateur.");
      return;
    }
    if (Notification.permission === "granted") {
      setNotifGranted(true);
      return;
    }
    if (Notification.permission === "denied") {
      alert("Les notifications sont bloquées.\n\niOS : Réglages > Apps > Safari > Notifications\nAutres : réglages du navigateur.");
      return;
    }
    try {
      const result = Notification.requestPermission(function(p) {
        setNotifGranted(p === "granted");
      });
      if (result && typeof result.then === "function") {
        result.then(p => setNotifGranted(p === "granted")).catch(() => {});
      }
    } catch(e) {}
  }

  function toggleTheme(){
    const nd=!darkMode;
    setDarkMode(nd);
    localStorage.setItem("defcon_theme",nd?"dark":"light");
  }

  function markDirty(){isDirty.current=true;}
  const selComp = comps.find(c=>c.id===selCompId);
  const days = selComp ? daysUntil(selComp.date) : null;

  // ─ Auto-recalcul timing quand le nombre d'athlètes d'un groupe change
  const athleteCountsKey = selComp?.groups?.map(g=>`${g.id}:${g.athleteCount||10}`).join('|') || '';
  const prevAthleteCountsKey = useRef('');
  useEffect(()=>{
    if (!selComp || !athleteCountsKey || athleteCountsKey === prevAthleteCountsKey.current) return;
    prevAthleteCountsKey.current = athleteCountsKey;
    const breakBetween = 10;
    // 1) Écarts entre groupes (offset intra-mouvement)
    const groups = [...selComp.groups].sort((a,b)=>(a.offset??0)-(b.offset??0));
    let cumOffset = 0;
    const newGroupOffsets = {};
    groups.forEach(g => {
      newGroupOffsets[g.id] = cumOffset;
      cumOffset += 3 * (g.athleteCount||10) * 1;
    });
    const totalMovDur = cumOffset; // durée totale squat (tous groupes)
    // 2) Heure de départ bench et deadlift (après la fin du squat de tous les groupes)
    const newMovOffsets = {
      squat: 0,
      bench: totalMovDur + breakBetween,
      deadlift: 2 * (totalMovDur + breakBetween),
    };
    const updatedGroups = selComp.groups.map(g=>({...g,offset:newGroupOffsets[g.id]??g.offset}));
    isDirty.current = true;
    setComps(prev=>prev.map(c=>c.id===selComp.id
      ?{...selComp, groups:updatedGroups, movementOffsets:newMovOffsets, groupMovOffsets:{}}
      :c));
  },[athleteCountsKey]);

  function updComp(updated){markDirty();setComps(prev=>prev.map(c=>c.id===updated.id?updated:c));}
  function updGroup(group){
    if (!selComp) return;
    const {_compMovOffsets, ...cleanGroup} = group;
    markDirty();
    const updatedComp = {
      ...selComp,
      groups: selComp.groups.map(g=>g.id===cleanGroup.id?cleanGroup:g),
      ...(_compMovOffsets ? {movementOffsets:_compMovOffsets} : {}),
    };
    setComps(prev=>prev.map(c=>c.id===updatedComp.id?updatedComp:c));
  }
  function rmGroup(gId){
    if(!selComp||selComp.groups.length<=1) return;
    const fb=selComp.groups.find(g=>g.id!==gId)?.id;
    markDirty();
    updComp({...selComp,
      groups:selComp.groups.filter(g=>g.id!==gId),
      athletes:selComp.athletes.map(a=>a.groupId===gId?{...a,groupId:fb}:a),
    });
    if (selGroupId===gId) setSelGroupId(fb||null);
  }
  function addComp(){
    const c=defaultComp();markDirty();
    setComps(prev=>[...prev,c]);
    setSelCompId(c.id);setSelAthleteId(null);setSelGroupId(null);
    setLaunchMode(false);setMobileScreen("editor");
  }
  function rmComp(id){
    markDirty();
    setComps(prev=>{
      const next=prev.filter(c=>c.id!==id);
      if (selCompId===id&&next.length){setSelCompId(next[0].id);setSelAthleteId(next[0].athletes?.[0]?.id||null);}
      return next;
    });
  }
  function addAthlete(){
    if (!selComp) return;
    const gId = selGroupId || selComp.groups[0]?.id;
    const a=defaultAthlete("Athlète "+(selComp.athletes.length+1), gId);
    markDirty();updComp({...selComp,athletes:[...selComp.athletes,a]});
    setSelAthleteId(a.id);setSelGroupId(null);setMobileScreen("editor");
  }
  // [FIX 4] Ajouter un athlète directement dans un groupe spécifique
  function addAthleteToGroup(groupId){
    if (!selComp) return;
    const a=defaultAthlete("Athlète "+(selComp.athletes.length+1), groupId);
    markDirty();updComp({...selComp,athletes:[...selComp.athletes,a]});
    setSelAthleteId(a.id);setSelGroupId(null);setMobileScreen("editor");
  }
  function addGroup(){
    if (!selComp) return;
    const lastOffset=selComp.groups.length>0?(selComp.groups[selComp.groups.length-1].offset??0):0;
    const g={...defaultGroup(`Groupe ${selComp.groups.length+1}`),offset:lastOffset+30};
    markDirty();updComp({...selComp,groups:[...selComp.groups,g]});
    // On reste sur la vue d'ensemble
  }
  function updAthlete(a){if(!selComp) return;markDirty();updComp({...selComp,athletes:selComp.athletes.map(x=>x.id===a.id?a:x)});}
  function rmAthlete(id){
    if(!selComp) return;markDirty();
    const next=selComp.athletes.filter(a=>a.id!==id);
    updComp({...selComp,athletes:next});
    if (selAthleteId===id) setSelAthleteId(next[0]?.id||null);
    setMobileScreen("editor");
  }
  function recalculateTiming(){
    if (!selComp) return;
    const breakBetween = 10;
    const groups = [...selComp.groups].sort((a,b)=>(a.offset??0)-(b.offset??0));
    let cumOffset = 0;
    const newGroupOffsets = {};
    groups.forEach(g => {
      newGroupOffsets[g.id] = cumOffset;
      cumOffset += 3 * (g.athleteCount||10) * 1; // 3 essais × N athlètes × 1 min
    });
    const totalMovDur = cumOffset;
    // Recalcule aussi les heures de départ bench et deadlift
    const newMovOffsets = {
      squat: 0,
      bench: totalMovDur + breakBetween,
      deadlift: 2 * (totalMovDur + breakBetween),
    };
    markDirty();
    const updatedGroups = selComp.groups.map(g => ({...g, offset: newGroupOffsets[g.id]??g.offset}));
    updComp({...selComp, groups:updatedGroups, movementOffsets:newMovOffsets, groupMovOffsets:{}});
  }
  function movPos(id,dir){
    if(!selComp) return;markDirty();
    updComp({...selComp,athletes:selComp.athletes.map(a=>{
      if(a.id!==id) return a;
      const mk=a.currentMovement||"squat";
      const op=a.movements[mk]?.position||1;
      return {...a,movements:{...a.movements,[mk]:{...a.movements[mk],position:dir==="up"?Math.max(1,op-1):op+1}}};
    })});
  }
  function resetCompetition(){
    if (!selComp||!window.confirm("Réinitialiser toute la compétition ?\n(Les séries cochées seront effacées, les données de planning conservées)")) return;
    markDirty();
    updComp({...selComp,athletes:selComp.athletes.map(a=>({
      ...a,currentMovement:"squat",
      movements:{
        squat:{...a.movements.squat,doneSets:{}},
        bench:{...a.movements.bench,doneSets:{}},
        deadlift:{...a.movements.deadlift,doneSets:{}},
      }
    }))});
  }

  function getLaunchGroups(){
    if (!selComp) return [];
    return [...(selComp.groups||[])].sort((a,b)=>(a.offset??0)-(b.offset??0)).map(group=>{
      const athletes=[...selComp.athletes.filter(a=>a.groupId===group.id)].sort((a,b)=>{
        const mk=a.currentMovement||"squat",bk=b.currentMovement||"squat";
        return (a.movements[mk]?.position||1)-(b.movements[bk]?.position||1);
      });
      return {group,athletes};
    }).filter(g=>g.athletes.length>0);
  }

  if (config===undefined) return (
    <div style={{height:"100dvh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",color:C.muted,fontFamily:"'DM Mono',monospace",fontSize:13,letterSpacing:"0.08em"}}>CHARGEMENT…</div>

  const HEADER_H=50;

  // ─ Panel liste des compétitions
  const CompListPanel = ()=>(

        {comps.map(c=>{

          const d=daysUntil(c.date);
          return (
            <div key={c.id} onClick={()=>{setSelCompId(c.id);setSelAthleteId(null);setSelGroupId(null);if(isMobile)setMobileScreen("editor");initAudio();}}

                {d===0?"AUJOURD'HUI":d>0?`J-${d}`:`J+${Math.abs(d)}`}
              </div>}
              {comps.length>1&&<button onClick={e=>{e.stopPropagation();rmComp(c.id);}}
                style={{...btnDanger,position:"absolute",top:8,right:8,padding:"2px 6px",fontSize:11}}>✕</button>}
            </div>

        })}
      </div>
      <div style={{padding:"8px 10px 14px",display:"flex",flexDirection:"column",gap:8,flexShrink:0}}>
        <button onClick={addComp} style={{...btnGhost,fontSize:12,padding:"9px"}}>+ Nouvelle compét.</button>
        {isMobile&&selComp&&<button onClick={()=>{setLaunchMode(true);setMobileScreen("launch");initAudio();setDelay(0);setDelayInp("0");}} style={{...btnGold,fontSize:12,padding:"10px"}}>🚀 LANCER</button>}
      </div>

        {!isMobile&&(

            <button onClick={()=>{setSelAthleteId(null);setSelGroupId(null);}} style={{...btnSm,fontSize:11,padding:"6px 9px",marginBottom:6,width:"100%",

              border:`1px solid ${(!selAthleteId&&!selGroupId)?C.goldBorder:C.border}`,

                  </div>
