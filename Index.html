<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DEFCON Meet Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body { background: #080c14; }
    input[type=number]::-webkit-inner-spin-button { opacity: 0.3; }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // ─── localStorage storage shim ─────────────────────────────────────────────
    const storage = {
      get: (key) => {
        try {
          const value = localStorage.getItem(key);
          return value !== null ? { key, value } : null;
        } catch { return null; }
      },
      set: (key, value) => {
        try { localStorage.setItem(key, value); return { key, value }; } catch { return null; }
      },
    };

    // ─── Utilities ─────────────────────────────────────────────────────────────
    function timeToMinutes(hhmm) {
      const [h, m] = hhmm.split(":").map(Number);
      return h * 60 + m;
    }
    function minutesToTime(mins) {
      const v = (((mins % 1440) + 1440) % 1440);
      return `${String(Math.floor(v / 60)).padStart(2, "0")}:${String(v % 60).padStart(2, "0")}`;
    }
    function nowSeconds() {
      const n = new Date();
      return n.getHours() * 3600 + n.getMinutes() * 60 + n.getSeconds();
    }
    function uid() { return Math.random().toString(36).slice(2, 9); }
    function formatDate(iso) {
      if (!iso) return "";
      return new Date(iso + "T12:00:00").toLocaleDateString("fr-FR", { day: "numeric", month: "long", year: "numeric" });
    }
    function daysUntil(iso) {
      if (!iso) return null;
      const today = new Date(); today.setHours(0, 0, 0, 0);
      const comp = new Date(iso + "T00:00:00"); comp.setHours(0, 0, 0, 0);
      return Math.round((comp - today) / 86400000);
    }

    // ─── Audio ─────────────────────────────────────────────────────────────────
    function playBeep(ctx, freq = 880, duration = 0.3, vol = 0.4) {
      if (!ctx) return;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(vol, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
      osc.start(); osc.stop(ctx.currentTime + duration);
    }
    function playAlert(ctx) {
      if (!ctx) return;
      playBeep(ctx, 880, 0.2, 0.5);
      setTimeout(() => playBeep(ctx, 1100, 0.2, 0.5), 250);
      setTimeout(() => playBeep(ctx, 1320, 0.4, 0.6), 500);
    }

    // ─── Schedule computation ──────────────────────────────────────────────────
    function computeSchedule(athlete, globalDelay = 0) {
      const { compStartTime, position, restBetween, setDuration, bufferBeforeOpener, warmupSets } = athlete;
      const n = warmupSets.length;
      if (!n || !compStartTime) return [];
      const liftMin = timeToMinutes(compStartTime) + (position - 1) + globalDelay;
      const lastSetStart = liftMin - bufferBeforeOpener - setDuration;
      return warmupSets.map((set, i) => {
        const offset = (n - 1 - i) * (restBetween + setDuration);
        const startMin = lastSetStart - offset;
        return { ...set, index: i, startMin, endMin: startMin + setDuration, startTime: minutesToTime(startMin), endTime: minutesToTime(startMin + setDuration) };
      });
    }

    // ─── Defaults ──────────────────────────────────────────────────────────────
    function defaultAthlete(name = "") {
      return {
        id: uid(), name: name || "Athlète",
        compStartTime: "10:00", position: 1,
        restBetween: 6, setDuration: 1, bufferBeforeOpener: 8, openerWeight: "",
        warmupSets: [{ id: uid(), weight: 0 }, { id: uid(), weight: 70 }, { id: uid(), weight: 120 }],
        doneSets: {},
      };
    }
    function defaultCompetition(name = "") {
      return { id: uid(), name: name || "Nouvelle compétition", date: "", athletes: [defaultAthlete("Athlète 1")] };
    }

    // ─── Style tokens ───────────────────────────────────────────────────────────
    const C = {
      bg: "#080c14",
      surface: "rgba(255,255,255,0.03)",
      border: "rgba(255,255,255,0.08)",
      gold: "#c9a84c",
      goldDim: "rgba(201,168,76,0.15)",
      goldBorder: "rgba(201,168,76,0.3)",
      red: "#e05252",
      redDim: "rgba(224,82,82,0.12)",
      green: "#4caf83",
      greenDim: "rgba(76,175,131,0.12)",
      text: "#dde3ed",
      muted: "#5a6478",
      subtle: "#2a3144",
    };
    const S = {
      label: { fontSize: 10, color: C.muted, textTransform: "uppercase", letterSpacing: "0.12em", marginBottom: 4, display: "block", fontFamily: "'Syne', sans-serif" },
      input: {
        background: "rgba(255,255,255,0.04)", border: `1px solid ${C.border}`,
        borderRadius: 5, color: C.text, padding: "5px 9px", fontSize: 13,
        fontFamily: "'DM Mono', monospace", outline: "none", transition: "border-color 0.2s",
      },
      ghostBtn: {
        background: "transparent", border: `1px dashed ${C.border}`,
        borderRadius: 7, color: C.muted, cursor: "pointer", fontSize: 12,
        padding: "8px 14px", width: "100%", transition: "all 0.2s", textAlign: "center",
        fontFamily: "'Syne', sans-serif",
      },
      dangerBtn: {
        background: C.redDim, border: `1px solid rgba(224,82,82,0.25)`,
        borderRadius: 5, color: C.red, cursor: "pointer", fontSize: 11,
        padding: "3px 8px", fontFamily: "'Syne', sans-serif",
      },
    };

    // ─── CountdownBadge ─────────────────────────────────────────────────────────
    function CountdownBadge({ targetMin, compact }) {
      const [secsLeft, setSecsLeft] = useState(null);
      useEffect(() => {
        const update = () => setSecsLeft(Math.round(targetMin * 60 - nowSeconds()));
        update();
        const iv = setInterval(update, 1000);
        return () => clearInterval(iv);
      }, [targetMin]);
      if (secsLeft === null) return null;
      const abs = Math.abs(secsLeft), mins = Math.floor(abs / 60), secs = abs % 60;
      const display = `${secsLeft < 0 ? "-" : ""}${String(mins).padStart(2, "0")}:${String(secs).padStart(2, "0")}`;
      const isPast = secsLeft < 0, isNow = abs < 90;
      const bg = isPast ? "rgba(224,82,82,0.15)" : isNow ? "rgba(201,168,76,0.2)" : "rgba(255,255,255,0.05)";
      const col = isPast ? C.red : isNow ? C.gold : C.muted;
      const brd = isPast ? "rgba(224,82,82,0.3)" : isNow ? C.goldBorder : C.border;
      return (
        <span style={{ fontFamily: "'DM Mono', monospace", fontSize: compact ? 12 : 13, fontWeight: 600,
          padding: compact ? "1px 6px" : "2px 9px", borderRadius: 4,
          background: bg, color: col, border: `1px solid ${brd}`, whiteSpace: "nowrap" }}>
          {display}
        </span>
      );
    }

    // ─── SetRow (edit mode) ─────────────────────────────────────────────────────
    function SetRow({ set, index, schedule, athleteName, onWeightChange, onRemove, audioCtx, notifGranted }) {
      const sched = schedule[index];
      const [alerted, setAlerted] = useState(false);
      const alertedRef = useRef(false);
      useEffect(() => {
        if (!sched) return;
        const iv = setInterval(() => {
          const diff = sched.startMin * 60 - nowSeconds();
          if (diff <= 0 && diff > -60 && !alertedRef.current) {
            alertedRef.current = true; setAlerted(true);
            playAlert(audioCtx.current);
            if (notifGranted) {
              new Notification(`${athleteName} — Série ${index + 1}`, { body: `C'est l'heure ! Série à ${set.weight} kg.` });
            }
          }
          if (diff < -90) alertedRef.current = false;
        }, 1000);
        return () => clearInterval(iv);
      }, [sched, index, set.weight, athleteName, audioCtx, notifGranted]);

      return (
        <div style={{ display: "grid", gridTemplateColumns: "24px 1fr 90px 100px 28px", gap: 8, alignItems: "center",
          padding: "9px 12px", borderRadius: 6, transition: "all 0.3s",
          background: alerted ? "rgba(201,168,76,0.07)" : C.surface,
          border: `1px solid ${alerted ? C.goldBorder : C.border}` }}>
          <span style={{ color: C.muted, fontFamily: "'DM Mono', monospace", fontSize: 12 }}>{index + 1}</span>
          <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
            <input type="number" value={set.weight} onChange={e => onWeightChange(index, +e.target.value)}
              style={{ ...S.input, width: 65 }} />
            <span style={{ color: C.muted, fontSize: 11 }}>kg</span>
          </div>
          {sched ? (
            <>
              <span style={{ fontFamily: "'DM Mono', monospace", fontSize: 13, color: C.text }}>{sched.startTime}</span>
              <CountdownBadge targetMin={sched.startMin} />
            </>
          ) : <><span style={{ color: C.muted, fontSize: 11 }}>—</span><span /></>}
          <button onClick={() => onRemove(index)} style={{ ...S.dangerBtn, padding: "2px 6px" }}>✕</button>
        </div>
      );
    }

    // ─── AthletePanel (edit mode) ───────────────────────────────────────────────
    function AthletePanel({ athlete, onUpdate, onRemove, audioCtx, notifGranted, canRemove, globalDelay }) {
      const [editingName, setEditingName] = useState(false);
      const [nameVal, setNameVal] = useState(athlete.name);
      const schedule = computeSchedule(athlete, globalDelay);
      const firstSet = schedule[0];
      const liftMin = timeToMinutes(athlete.compStartTime) + (athlete.position - 1) + globalDelay;

      const update = (key, val) => onUpdate({ ...athlete, [key]: val });
      const updateSet = (idx, key, val) => {
        const sets = athlete.warmupSets.map((s, i) => i === idx ? { ...s, [key]: val } : s);
        onUpdate({ ...athlete, warmupSets: sets });
      };
      const saveName = () => { setEditingName(false); onUpdate({ ...athlete, name: nameVal }); };

      return (
        <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 10, overflow: "hidden" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "12px 16px",
            background: "rgba(0,0,0,0.2)", borderBottom: `1px solid ${C.border}` }}>
            <span style={{ width: 7, height: 7, borderRadius: "50%", background: C.gold, flexShrink: 0 }} />
            {editingName ? (
              <input autoFocus value={nameVal} onChange={e => setNameVal(e.target.value)}
                onBlur={saveName} onKeyDown={e => e.key === "Enter" && saveName()}
                style={{ ...S.input, fontSize: 14, fontWeight: 600, flex: 1, fontFamily: "'Syne', sans-serif" }} />
            ) : (
              <span style={{ fontWeight: 600, fontSize: 14, flex: 1, cursor: "text", color: C.text, fontFamily: "'Syne', sans-serif" }}
                onClick={() => { setEditingName(true); setNameVal(athlete.name); }}>
                {athlete.name}
                <span style={{ fontSize: 10, color: C.muted, marginLeft: 8, fontWeight: 400 }}>renommer</span>
              </span>
            )}
            {canRemove && <button onClick={onRemove} style={S.dangerBtn}>Retirer</button>}
          </div>

          <div style={{ padding: "16px", display: "flex", flexDirection: "column", gap: 14 }}>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(130px, 1fr))", gap: 10 }}>
              {[
                { label: "Début compét.", el: <input type="time" value={athlete.compStartTime} onChange={e => update("compStartTime", e.target.value)} style={{ ...S.input, width: "auto" }} /> },
                { label: "Position", el: <input type="number" value={athlete.position} min={1} max={99} onChange={e => update("position", +e.target.value)} style={{ ...S.input, width: 65 }} /> },
                { label: "Repos (min)", el: <input type="number" value={athlete.restBetween} min={1} max={20} onChange={e => update("restBetween", +e.target.value)} style={{ ...S.input, width: 65 }} /> },
                { label: "Durée série (min)", el: <input type="number" value={athlete.setDuration} min={1} max={10} onChange={e => update("setDuration", +e.target.value)} style={{ ...S.input, width: 65 }} /> },
                { label: "Buffer opener (min)", el: <input type="number" value={athlete.bufferBeforeOpener} min={1} max={20} onChange={e => update("bufferBeforeOpener", +e.target.value)} style={{ ...S.input, width: 65 }} /> },
                { label: "Opener (kg)", el: <input type="number" value={athlete.openerWeight} min={0} onChange={e => update("openerWeight", e.target.value)} style={{ ...S.input, width: 65 }} /> },
              ].map(({ label, el }) => (
                <div key={label} style={{ display: "flex", flexDirection: "column" }}>
                  <span style={S.label}>{label}</span>{el}
                </div>
              ))}
            </div>

            {firstSet && (
              <div style={{ display: "flex", flexWrap: "wrap", gap: 14, padding: "12px 16px",
                background: "rgba(201,168,76,0.06)", borderRadius: 8, border: `1px solid ${C.goldBorder}`, alignItems: "center" }}>
                {[
                  { label: "1ère barre", value: firstSet.startTime, color: C.gold },
                  { label: "Passage", value: minutesToTime(liftMin), color: "#e0966b" },
                  ...(athlete.openerWeight ? [{ label: "Opener", value: `${athlete.openerWeight} kg`, color: "#e0966b" }] : []),
                ].map(({ label, value, color }, i, arr) => (
                  <div key={label} style={{ display: "flex", alignItems: "center", gap: 14 }}>
                    <div>
                      <div style={{ fontSize: 10, color: C.muted, textTransform: "uppercase", letterSpacing: "0.1em", fontFamily: "'Syne', sans-serif" }}>{label}</div>
                      <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 22, fontWeight: 700, color }}>{value}</div>
                    </div>
                    {i < arr.length - 1 && <div style={{ width: 1, height: 28, background: C.goldBorder }} />}
                  </div>
                ))}
                <div style={{ marginLeft: "auto" }}>
                  <div style={{ fontSize: 10, color: C.muted, marginBottom: 3, fontFamily: "'Syne', sans-serif" }}>Countdown 1ère barre</div>
                  <CountdownBadge targetMin={firstSet.startMin} />
                </div>
              </div>
            )}

            <div style={{ display: "flex", flexDirection: "column", gap: 5 }}>
              <div style={{ display: "grid", gridTemplateColumns: "24px 1fr 90px 100px 28px", gap: 8, padding: "0 12px", marginBottom: 2 }}>
                {["#", "Poids", "Horaire", "Countdown", ""].map(h => (
                  <span key={h} style={{ ...S.label, marginBottom: 0 }}>{h}</span>
                ))}
              </div>
              {athlete.warmupSets.map((set, i) => (
                <SetRow key={set.id} set={set} index={i} schedule={schedule} athleteName={athlete.name}
                  onWeightChange={(idx, val) => updateSet(idx, "weight", val)}
                  onRemove={idx => onUpdate({ ...athlete, warmupSets: athlete.warmupSets.filter((_, ii) => ii !== idx) })}
                  audioCtx={audioCtx} notifGranted={notifGranted} />
              ))}
              {athlete.openerWeight && schedule.length > 0 && (
                <div style={{ display: "grid", gridTemplateColumns: "24px 1fr 90px 100px 28px", gap: 8, alignItems: "center",
                  padding: "9px 12px", borderRadius: 6, background: "rgba(201,168,76,0.05)", border: `1px dashed ${C.goldBorder}` }}>
                  <span style={{ color: C.gold, fontSize: 12 }}>★</span>
                  <span style={{ color: C.gold, fontSize: 13 }}>{athlete.openerWeight} kg <span style={{ color: C.muted, fontSize: 11 }}>opener</span></span>
                  <span style={{ fontFamily: "'DM Mono', monospace", fontSize: 13, color: "#e0966b" }}>{minutesToTime(liftMin)}</span>
                  <CountdownBadge targetMin={liftMin} />
                  <span />
                </div>
              )}
              <button onClick={() => onUpdate({ ...athlete, warmupSets: [...athlete.warmupSets, { id: uid(), weight: 0 }] })}
                style={S.ghostBtn}>+ Ajouter une barre</button>
            </div>
          </div>
        </div>
      );
    }

    // ─── GlobalAthleteCard (launch mode) ───────────────────────────────────────
    function GlobalAthleteCard({ athlete, onUpdate, onPositionChange, canMoveUp, canMoveDown, globalDelay, audioCtx, notifGranted }) {
      const schedule = computeSchedule(athlete, globalDelay);
      const liftMin = timeToMinutes(athlete.compStartTime) + (athlete.position - 1) + globalDelay;
      const doneSets = athlete.doneSets || {};
      const alertedRef = useRef({});

      useEffect(() => {
        const ivs = schedule.map((sched, i) => {
          return setInterval(() => {
            const diff = sched.startMin * 60 - nowSeconds();
            if (diff <= 0 && diff > -60 && !alertedRef.current[i]) {
              alertedRef.current[i] = true;
              if (!doneSets[i]) {
                playAlert(audioCtx.current);
                if (notifGranted) {
                  new Notification(`${athlete.name} — Série ${i + 1}`, { body: `C'est l'heure ! Série à ${sched.weight} kg.` });
                }
              }
            }
            if (diff < -90) delete alertedRef.current[i];
          }, 1000);
        });
        return () => ivs.forEach(clearInterval);
      }, [schedule, doneSets, athlete.name, audioCtx, notifGranted]);

      const toggleDone = (idx) => {
        const next = { ...doneSets, [idx]: !doneSets[idx] };
        onUpdate({ ...athlete, doneSets: next });
      };

      const allDone = schedule.length > 0 && schedule.every((_, i) => doneSets[i]);
      const nextSetIdx = schedule.findIndex((_, i) => !doneSets[i]);

      return (
        <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 10, overflow: "hidden", transition: "border-color 0.3s",
          ...(allDone ? { borderColor: "rgba(76,175,131,0.3)" } : {}) }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 16px",
            background: allDone ? "rgba(76,175,131,0.05)" : "rgba(0,0,0,0.2)", borderBottom: `1px solid ${C.border}` }}>
            <span style={{ width: 6, height: 6, borderRadius: "50%",
              background: allDone ? C.green : nextSetIdx === 0 ? C.gold : C.muted, flexShrink: 0 }} />
            <span style={{ fontWeight: 700, fontSize: 14, flex: 1, color: C.text, fontFamily: "'Syne', sans-serif" }}>
              {athlete.name}
            </span>
            <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
              <span style={{ fontSize: 10, color: C.muted, fontFamily: "'Syne', sans-serif" }}>Pos.</span>
              <button disabled={!canMoveUp} onClick={() => onPositionChange("up")}
                style={{ background: canMoveUp ? "rgba(255,255,255,0.05)" : "transparent",
                  border: `1px solid ${canMoveUp ? C.border : "transparent"}`,
                  borderRadius: 4, color: canMoveUp ? C.text : C.muted, cursor: canMoveUp ? "pointer" : "default",
                  fontSize: 11, padding: "2px 6px", fontFamily: "'DM Mono', monospace" }}>↑</button>
              <span style={{ fontFamily: "'DM Mono', monospace", fontSize: 12, color: C.gold, minWidth: 20, textAlign: "center" }}>
                {athlete.position}
              </span>
              <button disabled={!canMoveDown} onClick={() => onPositionChange("down")}
                style={{ background: canMoveDown ? "rgba(255,255,255,0.05)" : "transparent",
                  border: `1px solid ${canMoveDown ? C.border : "transparent"}`,
                  borderRadius: 4, color: canMoveDown ? C.text : C.muted, cursor: canMoveDown ? "pointer" : "default",
                  fontSize: 11, padding: "2px 6px", fontFamily: "'DM Mono', monospace" }}>↓</button>
            </div>
            <div style={{ textAlign: "right" }}>
              <div style={{ fontSize: 9, color: C.muted, textTransform: "uppercase", letterSpacing: "0.1em", fontFamily: "'Syne', sans-serif" }}>Passage</div>
              <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 15, fontWeight: 700, color: "#e0966b" }}>
                {minutesToTime(liftMin)}
              </div>
            </div>
          </div>

          <div style={{ padding: "12px 14px", display: "flex", flexDirection: "column", gap: 5 }}>
            {schedule.map((sched, i) => {
              const isDone = !!doneSets[i];
              const isNext = i === nextSetIdx && !allDone;
              const secsLeft = Math.round(sched.startMin * 60 - nowSeconds());
              const isUrgent = !isDone && Math.abs(secsLeft) < 90;
              return (
                <div key={sched.id || i} style={{ display: "grid", gridTemplateColumns: "28px 1fr auto auto 36px", gap: 8, alignItems: "center",
                  padding: "8px 10px", borderRadius: 7, transition: "all 0.25s",
                  background: isDone ? "rgba(76,175,131,0.06)" : isUrgent ? "rgba(201,168,76,0.08)" : isNext ? "rgba(255,255,255,0.04)" : "transparent",
                  border: `1px solid ${isDone ? "rgba(76,175,131,0.2)" : isUrgent ? C.goldBorder : isNext ? "rgba(255,255,255,0.08)" : "transparent"}`,
                  opacity: isDone ? 0.55 : 1 }}>
                  <span style={{ fontFamily: "'DM Mono', monospace", fontSize: 11, color: C.muted, textAlign: "center" }}>{i + 1}</span>
                  <span style={{ fontFamily: "'DM Mono', monospace", fontSize: 14, fontWeight: isDone ? 400 : 600,
                    color: isDone ? C.muted : isNext ? C.gold : C.text,
                    textDecoration: isDone ? "line-through" : "none" }}>
                    {sched.weight} <span style={{ fontSize: 11, color: C.muted, fontWeight: 400 }}>kg</span>
                  </span>
                  <span style={{ fontFamily: "'DM Mono', monospace", fontSize: 12, color: isDone ? C.muted : C.text }}>{sched.startTime}</span>
                  {!isDone ? <CountdownBadge targetMin={sched.startMin} compact /> : (
                    <span style={{ fontSize: 11, color: C.green, fontFamily: "'Syne', sans-serif" }}>Fait</span>
                  )}
                  <button onClick={() => toggleDone(i)}
                    title={isDone ? "Marquer comme non fait" : "Marquer comme fait"}
                    style={{ width: 26, height: 26, borderRadius: 5, cursor: "pointer", flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center",
                      transition: "all 0.2s", fontSize: 13,
                      background: isDone ? "rgba(76,175,131,0.2)" : "rgba(255,255,255,0.04)",
                      border: `1px solid ${isDone ? "rgba(76,175,131,0.4)" : C.border}`,
                      color: isDone ? C.green : C.muted }}>
                    {isDone ? "✓" : "○"}
                  </button>
                </div>
              );
            })}
            {athlete.openerWeight && (
              <div style={{ display: "grid", gridTemplateColumns: "28px 1fr auto auto 36px", gap: 8, alignItems: "center",
                padding: "8px 10px", borderRadius: 7, background: "rgba(201,168,76,0.05)", border: `1px dashed ${C.goldBorder}` }}>
                <span style={{ color: C.gold, fontSize: 11, textAlign: "center" }}>★</span>
                <span style={{ fontFamily: "'DM Mono', monospace", fontSize: 14, fontWeight: 600, color: C.gold }}>
                  {athlete.openerWeight} <span style={{ fontSize: 11, color: C.muted, fontWeight: 400 }}>kg</span>
                  <span style={{ fontSize: 10, color: C.muted, marginLeft: 6, fontFamily: "'Syne', sans-serif" }}>opener</span>
                </span>
                <span style={{ fontFamily: "'DM Mono', monospace", fontSize: 12, color: "#e0966b" }}>{minutesToTime(liftMin)}</span>
                <CountdownBadge targetMin={liftMin} compact />
                <span />
              </div>
            )}
          </div>
        </div>
      );
    }

    // ─── Main App ───────────────────────────────────────────────────────────────
    function App() {
      const [competitions, setCompetitions] = useState(null);
      const [selectedCompId, setSelectedCompId] = useState(null);
      const [selectedAthleteId, setSelectedAthleteId] = useState(null);
      const [notifGranted, setNotifGranted] = useState(false);
      const [launchMode, setLaunchMode] = useState(false);
      const [saving, setSaving] = useState(false);
      const [clock, setClock] = useState("");
      const [editingCompName, setEditingCompName] = useState(false);
      const [compNameVal, setCompNameVal] = useState("");
      const [globalDelay, setGlobalDelay] = useState(0);
      const [delayInput, setDelayInput] = useState("0");
      const [expandedAthletes, setExpandedAthletes] = useState({});
      const audioCtx = useRef(null);

      useEffect(() => {
        const tick = () => {
          const n = new Date();
          setClock(`${String(n.getHours()).padStart(2, "0")}:${String(n.getMinutes()).padStart(2, "0")}:${String(n.getSeconds()).padStart(2, "0")}`);
        };
        tick(); const iv = setInterval(tick, 1000); return () => clearInterval(iv);
      }, []);

      useEffect(() => {
        try {
          const res = storage.get("competitions_v2");
          if (res && res.value) {
            const data = JSON.parse(res.value);
            setCompetitions(data);
            if (data.length > 0) {
              setSelectedCompId(data[0].id);
              if (data[0].athletes.length > 0) setSelectedAthleteId(data[0].athletes[0].id);
            }
          } else {
            const initial = [defaultCompetition("Ma première compétition")];
            setCompetitions(initial);
            setSelectedCompId(initial[0].id);
            setSelectedAthleteId(initial[0].athletes[0].id);
          }
        } catch {
          const initial = [defaultCompetition("Ma première compétition")];
          setCompetitions(initial);
          setSelectedCompId(initial[0].id);
          setSelectedAthleteId(initial[0].athletes[0].id);
        }
      }, []);

      useEffect(() => {
        if (!competitions) return;
        const save = () => {
          setSaving(true);
          storage.set("competitions_v2", JSON.stringify(competitions));
          setTimeout(() => setSaving(false), 600);
        };
        const t = setTimeout(save, 400);
        return () => clearTimeout(t);
      }, [competitions]);

      function initAudio() {
        if (!audioCtx.current) audioCtx.current = new (window.AudioContext || window.webkitAudioContext)();
        playBeep(audioCtx.current, 660, 0.1, 0.15);
      }
      async function requestNotifications() {
        initAudio();
        if ("Notification" in window) {
          const p = await Notification.requestPermission();
          setNotifGranted(p === "granted");
        }
      }

      const selectedComp = competitions?.find(c => c.id === selectedCompId);

      function updateComp(updated) {
        setCompetitions(prev => prev.map(c => c.id === updated.id ? updated : c));
      }
      function addComp() {
        const c = defaultCompetition();
        setCompetitions(prev => [...prev, c]);
        setSelectedCompId(c.id);
        setSelectedAthleteId(c.athletes[0].id);
        setLaunchMode(false);
      }
      function removeComp(id) {
        setCompetitions(prev => {
          const next = prev.filter(c => c.id !== id);
          if (selectedCompId === id && next.length) { setSelectedCompId(next[0].id); setSelectedAthleteId(next[0].athletes[0]?.id); }
          return next;
        });
      }
      function addAthlete() {
        if (!selectedComp) return;
        const a = defaultAthlete();
        updateComp({ ...selectedComp, athletes: [...selectedComp.athletes, a] });
        setSelectedAthleteId(a.id);
      }
      function updateAthlete(updated) {
        if (!selectedComp) return;
        updateComp({ ...selectedComp, athletes: selectedComp.athletes.map(a => a.id === updated.id ? updated : a) });
      }
      function removeAthlete(id) {
        if (!selectedComp) return;
        const next = selectedComp.athletes.filter(a => a.id !== id);
        updateComp({ ...selectedComp, athletes: next });
        if (selectedAthleteId === id) setSelectedAthleteId(next[0]?.id || null);
      }
      function moveAthletePosition(id, dir) {
        if (!selectedComp) return;
        const athletes = selectedComp.athletes.map(a => {
          if (a.id !== id) return a;
          const newPos = dir === "up" ? Math.max(1, a.position - 1) : a.position + 1;
          return { ...a, position: newPos };
        });
        updateComp({ ...selectedComp, athletes });
      }

      const days = selectedComp ? daysUntil(selectedComp.date) : null;

      if (!competitions) return (
        <div style={{ minHeight: "100vh", background: C.bg, display: "flex", alignItems: "center", justifyContent: "center", color: C.muted, fontFamily: "sans-serif" }}>
          Chargement…
        </div>
      );

      const sortedAthletes = selectedComp ? [...selectedComp.athletes].sort((a, b) => a.position - b.position) : [];
      const maxPosition = selectedComp ? Math.max(...selectedComp.athletes.map(a => a.position), 0) : 1;

      return (
        <div style={{ minHeight: "100vh", background: C.bg, color: C.text, fontFamily: "'Syne', sans-serif", display: "flex", flexDirection: "column" }}>
          <style>{`
            input:focus { outline: none !important; border-color: rgba(201,168,76,0.3) !important; box-shadow: 0 0 0 2px rgba(201,168,76,0.1) !important; }
            button:hover { opacity: 0.8; }
            button:active { transform: scale(0.97); }
            button { font-family: 'Syne', sans-serif; }
          `}</style>

          {/* Header */}
          <header style={{ display: "flex", alignItems: "center", justifyContent: "space-between",
            padding: "10px 22px", borderBottom: `1px solid ${C.border}`,
            background: "rgba(8,12,20,0.95)", backdropFilter: "blur(10px)",
            position: "sticky", top: 0, zIndex: 20 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                <div style={{ width: 18, height: 18, borderRadius: 4, background: C.gold, display: "flex", alignItems: "center", justifyContent: "center" }}>
                  <div style={{ width: 8, height: 8, border: "2px solid rgba(0,0,0,0.5)", borderRadius: 1 }} />
                </div>
                <span style={{ fontWeight: 700, fontSize: 14, letterSpacing: "0.02em", color: C.text }}>DEFCON</span>
                <span style={{ fontWeight: 400, fontSize: 14, letterSpacing: "0.05em", color: C.muted }}>MEET PLANNER</span>
              </div>
              {launchMode && selectedComp && (
                <span style={{ fontSize: 10, background: "rgba(224,82,82,0.12)", color: C.red,
                  padding: "2px 8px", borderRadius: 3, letterSpacing: "0.1em", fontWeight: 600 }}>LIVE</span>
              )}
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
              {saving
                ? <span style={{ fontSize: 10, color: C.muted, letterSpacing: "0.08em" }}>SAUVEGARDE…</span>
                : <span style={{ fontSize: 10, color: "rgba(76,175,131,0.7)", letterSpacing: "0.08em" }}>SAUVEGARDÉ</span>
              }
              <span style={{ fontFamily: "'DM Mono', monospace", fontSize: 20, fontWeight: 500, color: C.gold, letterSpacing: "0.05em" }}>{clock}</span>
              <button onClick={requestNotifications}
                style={{ background: notifGranted ? "rgba(76,175,131,0.1)" : "rgba(201,168,76,0.08)",
                  border: `1px solid ${notifGranted ? "rgba(76,175,131,0.3)" : C.goldBorder}`,
                  borderRadius: 5, color: notifGranted ? C.green : C.gold,
                  cursor: "pointer", fontSize: 11, padding: "4px 10px", letterSpacing: "0.05em" }}>
                {notifGranted ? "NOTIFS ON" : "ACTIVER NOTIFS"}
              </button>
            </div>
          </header>

          <div style={{ display: "flex", flex: 1, overflow: "hidden" }}>
            {/* Sidebar competitions */}
            <aside style={{ width: 220, borderRight: `1px solid ${C.border}`, display: "flex",
              flexDirection: "column", background: "rgba(0,0,0,0.2)", flexShrink: 0 }}>
              <div style={{ padding: "14px 12px 6px", fontSize: 9, color: C.muted, textTransform: "uppercase", letterSpacing: "0.15em" }}>
                Compétitions
              </div>
              <div style={{ flex: 1, overflowY: "auto", padding: "0 10px 10px" }}>
                {competitions.map(c => {
                  const isActive = c.id === selectedCompId;
                  const d = daysUntil(c.date);
                  return (
                    <div key={c.id} onClick={() => { setSelectedCompId(c.id); setSelectedAthleteId(c.athletes[0]?.id || null); setLaunchMode(false); initAudio(); }}
                      style={{ padding: "10px 12px", borderRadius: 7, cursor: "pointer", marginBottom: 4,
                        background: isActive ? C.goldDim : C.surface,
                        border: `1px solid ${isActive ? C.goldBorder : C.border}`,
                        transition: "all 0.15s", position: "relative" }}>
                      <div style={{ fontWeight: 600, fontSize: 13, color: isActive ? C.gold : "#a0aec0", paddingRight: 18 }}>{c.name}</div>
                      <div style={{ fontSize: 10, color: C.muted, marginTop: 2 }}>{c.date ? formatDate(c.date) : "Date non définie"}</div>
                      <div style={{ fontSize: 10, color: C.muted, marginTop: 1 }}>{c.athletes.length} athlète{c.athletes.length > 1 ? "s" : ""}</div>
                      {d !== null && (
                        <div style={{ fontSize: 9, marginTop: 2, color: d === 0 ? C.red : d > 0 ? C.gold : C.muted, fontWeight: 700, letterSpacing: "0.08em" }}>
                          {d === 0 ? "AUJOURD'HUI" : d > 0 ? `J-${d}` : `J+${Math.abs(d)}`}
                        </div>
                      )}
                      {competitions.length > 1 && (
                        <button onClick={e => { e.stopPropagation(); removeComp(c.id); }}
                          style={{ ...S.dangerBtn, position: "absolute", top: 8, right: 8, padding: "1px 5px", fontSize: 10 }}>✕</button>
                      )}
                    </div>
                  );
                })}
              </div>
              <div style={{ padding: "8px 10px 14px" }}>
                <button onClick={addComp} style={S.ghostBtn}>+ Nouvelle compét.</button>
              </div>
            </aside>

            {/* Main area */}
            <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>
              {selectedComp ? (
                <>
                  <div style={{ padding: "12px 22px", borderBottom: `1px solid ${C.border}`,
                    background: "rgba(0,0,0,0.1)", display: "flex", alignItems: "center", gap: 14, flexWrap: "wrap" }}>
                    {editingCompName ? (
                      <input autoFocus value={compNameVal}
                        onChange={e => setCompNameVal(e.target.value)}
                        onBlur={() => { setEditingCompName(false); updateComp({ ...selectedComp, name: compNameVal }); }}
                        onKeyDown={e => e.key === "Enter" && (() => { setEditingCompName(false); updateComp({ ...selectedComp, name: compNameVal }); })()}
                        style={{ ...S.input, fontSize: 16, fontWeight: 700, fontFamily: "'Syne', sans-serif", minWidth: 240 }} />
                    ) : (
                      <h2 style={{ margin: 0, fontSize: 16, fontWeight: 700, cursor: "text", color: C.text }}
                        onClick={() => { setEditingCompName(true); setCompNameVal(selectedComp.name); }}>
                        {selectedComp.name}
                        <span style={{ fontSize: 10, color: C.muted, marginLeft: 8, fontWeight: 400 }}>renommer</span>
                      </h2>
                    )}
                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                      <span style={{ fontSize: 10, color: C.muted }}>Date :</span>
                      <input type="date" value={selectedComp.date}
                        onChange={e => updateComp({ ...selectedComp, date: e.target.value })}
                        style={{ ...S.input, width: "auto", fontSize: 12 }} />
                      {days !== null && (
                        <span style={{ fontSize: 10, fontWeight: 700, padding: "2px 8px", borderRadius: 3, letterSpacing: "0.08em",
                          background: days === 0 ? C.redDim : C.goldDim,
                          color: days === 0 ? C.red : C.gold,
                          border: `1px solid ${days === 0 ? "rgba(224,82,82,0.3)" : C.goldBorder}` }}>
                          {days === 0 ? "AUJOURD'HUI" : days > 0 ? `J-${days}` : `J+${Math.abs(days)}`}
                        </span>
                      )}
                    </div>
                    <div style={{ marginLeft: "auto", display: "flex", gap: 8 }}>
                      {!launchMode ? (
                        <button onClick={() => { setLaunchMode(true); initAudio(); setGlobalDelay(0); setDelayInput("0"); }}
                          style={{ background: C.goldDim, border: `1px solid ${C.goldBorder}`,
                            borderRadius: 6, color: C.gold, cursor: "pointer", fontSize: 12, fontWeight: 700,
                            padding: "7px 16px", letterSpacing: "0.06em" }}>
                          LANCER LA COMPETITION
                        </button>
                      ) : (
                        <button onClick={() => setLaunchMode(false)}
                          style={{ background: "rgba(90,100,120,0.12)", border: `1px solid ${C.border}`,
                            borderRadius: 6, color: C.muted, cursor: "pointer", fontSize: 12, padding: "7px 16px" }}>
                          ← Retour édition
                        </button>
                      )}
                    </div>
                  </div>

                  {launchMode ? (
                    <div style={{ flex: 1, overflowY: "auto", padding: "20px 22px" }}>
                      <div style={{ maxWidth: 900, margin: "0 auto", display: "flex", flexDirection: "column", gap: 14 }}>
                        {/* Delay banner */}
                        <div style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 16px",
                          background: globalDelay > 0 ? "rgba(224,82,82,0.07)" : "rgba(255,255,255,0.02)",
                          border: `1px solid ${globalDelay > 0 ? "rgba(224,82,82,0.25)" : C.border}`, borderRadius: 8 }}>
                          <span style={{ fontSize: 10, color: C.muted, textTransform: "uppercase", letterSpacing: "0.12em", flexShrink: 0 }}>Retard</span>
                          <div style={{ display: "flex", gap: 6 }}>
                            {[5, 10, 15, 20, 30].map(min => (
                              <button key={min} onClick={() => { const nd = globalDelay + min; setGlobalDelay(nd); setDelayInput(String(nd)); }}
                                style={{ background: "rgba(255,255,255,0.04)", border: `1px solid ${C.border}`,
                                  borderRadius: 4, color: C.muted, cursor: "pointer", fontSize: 11,
                                  padding: "3px 8px", fontFamily: "'DM Mono', monospace" }}>
                                +{min}
                              </button>
                            ))}
                          </div>
                          <div style={{ display: "flex", alignItems: "center", gap: 6, marginLeft: 4 }}>
                            <input type="number" value={delayInput} min={0}
                              onChange={e => setDelayInput(e.target.value)}
                              onBlur={() => { const v = parseInt(delayInput) || 0; setGlobalDelay(v); setDelayInput(String(v)); }}
                              style={{ ...S.input, width: 60, textAlign: "center" }} />
                            <span style={{ fontSize: 10, color: C.muted }}>min</span>
                          </div>
                          {globalDelay > 0 && (
                            <>
                              <div style={{ padding: "2px 10px", borderRadius: 4, background: C.redDim,
                                border: "1px solid rgba(224,82,82,0.25)", fontFamily: "'DM Mono', monospace",
                                fontSize: 13, fontWeight: 600, color: C.red }}>
                                +{globalDelay} min
                              </div>
                              <button onClick={() => { setGlobalDelay(0); setDelayInput("0"); }}
                                style={{ background: "transparent", border: "none", color: C.muted, cursor: "pointer", fontSize: 11 }}>
                                Réinitialiser
                              </button>
                            </>
                          )}
                        </div>

                        {sortedAthletes.map((athlete) => {
                          const isExpanded = !!expandedAthletes[athlete.id];
                          return (
                            <div key={athlete.id}>
                              <GlobalAthleteCard
                                athlete={athlete}
                                onUpdate={updateAthlete}
                                onPositionChange={dir => moveAthletePosition(athlete.id, dir)}
                                canMoveUp={athlete.position > 1}
                                canMoveDown={athlete.position < maxPosition + 1}
                                globalDelay={globalDelay}
                                audioCtx={audioCtx}
                                notifGranted={notifGranted}
                              />
                              <div style={{ marginTop: 4 }}>
                                <button onClick={() => setExpandedAthletes(prev => ({ ...prev, [athlete.id]: !prev[athlete.id] }))}
                                  style={{ background: "transparent", border: "none", color: C.muted, cursor: "pointer",
                                    fontSize: 10, padding: "4px 8px", letterSpacing: "0.08em", display: "flex", alignItems: "center", gap: 5 }}>
                                  <span style={{ transform: isExpanded ? "rotate(90deg)" : "none", display: "inline-block", transition: "transform 0.2s" }}>›</span>
                                  {isExpanded ? "FERMER MODIFICATIONS AVANCÉES" : "MODIFICATIONS AVANCÉES"}
                                </button>
                                {isExpanded && (
                                  <div style={{ marginTop: 8, padding: 14, background: "rgba(0,0,0,0.15)",
                                    border: `1px solid ${C.border}`, borderRadius: 8 }}>
                                    <AthletePanel
                                      athlete={athlete}
                                      onUpdate={updateAthlete}
                                      onRemove={() => removeAthlete(athlete.id)}
                                      canRemove={selectedComp.athletes.length > 1}
                                      audioCtx={audioCtx}
                                      notifGranted={notifGranted}
                                      globalDelay={globalDelay}
                                    />
                                  </div>
                                )}
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  ) : (
                    <div style={{ flex: 1, display: "flex", overflow: "hidden" }}>
                      {/* Athletes sidebar */}
                      <div style={{ width: 185, borderRight: `1px solid ${C.border}`, display: "flex",
                        flexDirection: "column", background: "rgba(0,0,0,0.12)", flexShrink: 0 }}>
                        <div style={{ padding: "12px 10px 6px", fontSize: 9, color: C.muted, textTransform: "uppercase", letterSpacing: "0.15em" }}>
                          Athlètes
                        </div>
                        <div style={{ flex: 1, overflowY: "auto", padding: "0 8px 8px" }}>
                          {selectedComp.athletes.map(a => {
                            const sched = computeSchedule(a, 0);
                            const first = sched[0];
                            const isAct = a.id === selectedAthleteId;
                            return (
                              <div key={a.id} onClick={() => setSelectedAthleteId(a.id)}
                                style={{ padding: "9px 10px", borderRadius: 6, cursor: "pointer", marginBottom: 4,
                                  background: isAct ? C.goldDim : C.surface,
                                  border: `1px solid ${isAct ? C.goldBorder : C.border}` }}>
                                <div style={{ fontSize: 13, fontWeight: 600, color: isAct ? C.gold : "#a0aec0" }}>{a.name}</div>
                                {first && <div style={{ fontSize: 10, color: C.muted, fontFamily: "'DM Mono', monospace", marginTop: 2 }}>{first.startTime}</div>}
                              </div>
                            );
                          })}
                        </div>
                        <div style={{ padding: "6px 8px 12px" }}>
                          <button onClick={addAthlete} style={{ ...S.ghostBtn, fontSize: 11, padding: "7px" }}>+ Ajouter athlète</button>
                        </div>
                      </div>

                      {/* Athlete detail */}
                      <div style={{ flex: 1, overflowY: "auto", padding: "18px 22px" }}>
                        {selectedComp.athletes.length === 0 ? (
                          <div style={{ textAlign: "center", color: C.muted, marginTop: 60, fontSize: 13 }}>
                            Aucun athlète dans cette compétition.<br />
                            <button onClick={addAthlete} style={{ marginTop: 16, padding: "9px 18px",
                              background: C.goldDim, border: `1px solid ${C.goldBorder}`,
                              borderRadius: 6, color: C.gold, cursor: "pointer", fontSize: 13 }}>
                              + Ajouter le premier athlète
                            </button>
                          </div>
                        ) : (() => {
                          const athlete = selectedComp.athletes.find(a => a.id === selectedAthleteId);
                          if (!athlete) return <div style={{ color: C.muted, marginTop: 40, textAlign: "center", fontSize: 13 }}>Sélectionne un athlète.</div>;
                          return (
                            <AthletePanel athlete={athlete} onUpdate={updateAthlete}
                              onRemove={() => removeAthlete(athlete.id)}
                              canRemove={selectedComp.athletes.length > 1}
                              audioCtx={audioCtx} notifGranted={notifGranted} globalDelay={0} />
                          );
                        })()}
                      </div>
                    </div>
                  )}
                </>
              ) : (
                <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", color: C.muted, fontSize: 13 }}>
                  Sélectionne ou crée une compétition.
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
